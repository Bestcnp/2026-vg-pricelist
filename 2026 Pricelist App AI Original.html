<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricelist & Quotation Manager AI</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel to compile JSX inside the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- localForage for unlimited IndexedDB storage (bypasses 5MB limit) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

  <style>
    /* Printing Overrides - Luxury & Formal Edition */
    @media print {
      @page { margin: 12mm 8mm; size: auto; }
      html { font-size: 72% !important; }
      
      body { background-color: white !important; color: #0f172a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; min-height: auto !important; }
      .print\:hidden { display: none !important; }
      .print\:flex { display: flex !important; }
      .print\:block { display: block !important; }
      
      main { display: block !important; margin: 0 !important; padding: 0 !important; max-width: none !important; grid-template-columns: 1fr !important; gap: 0 !important; }
      section { border: none !important; box-shadow: none !important; padding: 0 !important; min-height: auto !important; }
      
      .overflow-x-auto { overflow: visible !important; }
      table { width: 100% !important; border-collapse: collapse !important; page-break-inside: auto; border: 2px solid #0f172a !important; }
      tr { page-break-inside: avoid; page-break-after: auto; }
      
      /* Refined cell borders */
      th, td { 
        border: 1px solid #cbd5e1 !important; 
        padding: 5px 6px !important;
        line-height: 1.2 !important;
      }
      
      /* Solid black line under header */
      thead th { border-bottom: 2px solid #0f172a !important; }
      
      td img { 
        width: 64px !important; 
        height: 64px !important; 
        min-height: 64px !important;
        object-fit: contain !important;
      }

      .mb-8 { margin-bottom: 1rem !important; }
      .mb-6 { margin-bottom: 0.75rem !important; }
      .p-6 { padding: 0.75rem !important; }
      .mt-16 { margin-top: 1rem !important; }
      .pt-8 { padding-top: 0.5rem !important; }

      .page-break-inside-avoid { page-break-inside: avoid !important; }
    }
  </style>
</head>
<body>
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- INITIAL DATA ---
    const initialCategories = [
      { id: 'c1', name: 'Primo', discount: 12 },
      { id: 'c2', name: 'Primo Pipe', discount: 10 },
      { id: 'c3', name: 'Primo Adjuster', discount: 10 },
      { id: 'c4', name: 'Primo Mesh', discount: 10 },
    ];

    const initialProducts = [
      {
        id: 1,
        name: 'รางน้ำฝน วีจี พรีโม่',
        categoryId: 'c1',
        image: 'https://placehold.co/200x200/f8fafc/94a3b8?text=Gutter',
        packQty: '6',
        unit: 'เส้น / มัด',
        prices: {
          v1: { dealerBox: 517, dealerUnbox: 530, sellingPrice: 580, retail: 620 },
          v2: { dealerBox: 550, dealerUnbox: 565, sellingPrice: 600, retail: 660 },
          v3: { dealerBox: 550, dealerUnbox: 565, sellingPrice: 600, retail: 660 },
          v4: { dealerBox: 550, dealerUnbox: 565, sellingPrice: 600, retail: 660 }
        }
      },
      {
        id: 2,
        name: 'ตะแกรงอลูมิเนียม',
        categoryId: 'c4',
        image: 'https://placehold.co/200x200/f8fafc/94a3b8?text=Mesh',
        packQty: '40',
        unit: 'ชิ้น / ลัง',
        prices: {
          v1: { dealerBox: 122, dealerUnbox: 130, sellingPrice: 132, retail: 135 },
          v2: { dealerBox: 122, dealerUnbox: 130, sellingPrice: 132, retail: 135 },
          v3: { dealerBox: 122, dealerUnbox: 130, sellingPrice: 132, retail: 135 },
          v4: { dealerBox: 122, dealerUnbox: 130, sellingPrice: 132, retail: 135 }
        }
      }
    ];

    function App() {
      // --- STATE ---
      const [activeTab, setActiveTab] = useState('lpPricelist');
      const [isSaving, setIsSaving] = useState(false);
      
      const [categories, setCategories] = useState(initialCategories);
      const [products, setProducts] = useState(initialProducts);
      const [headers, setHeaders] = useState({ v1: 'White (ขาว)', v2: 'Brown (น้ำตาล)', v3: 'Grey (เทา)', v4: 'Black (ดำ)' });
      
      const [company, setCompany] = useState({
        name: 'บริษัท วี อาร์ จี มาร์เก็ตติ้ง จำกัด',
        address: 'เลขประจำตัวผู้เสียภาษี: 010 555 403 8564 (สำนักงานใหญ่)\nที่อยู่: 33/2 ม. 18 ตำบลศาลาแดง อำเภอบางน้ำเปรี้ยว จังหวัดฉะเชิงเทรา 24000',
        contact: 'โทร: 038-592-629, 087-654-7788',
        logo: 'https://placehold.co/150x150/1e3a8a/ffffff?text=LOGO'
      });

      const [customer, setCustomer] = useState({
        name: '',
        address: '',
        contact: ''
      });

      const [salesperson, setSalesperson] = useState('');
      const [salespersonPhone, setSalespersonPhone] = useState('');
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [productToDelete, setProductToDelete] = useState(null);
      
      const [newProduct, setNewProduct] = useState({
        name: '', categoryId: '', image: '', packQty: '', unit: '',
        v1DealerBox: '', v1DealerUnbox: '', v1SellingPrice: '', v1Retail: '', 
        v2DealerBox: '', v2DealerUnbox: '', v2SellingPrice: '', v2Retail: '', 
        v3DealerBox: '', v3DealerUnbox: '', v3SellingPrice: '', v3Retail: '', 
        v4DealerBox: '', v4DealerUnbox: '', v4SellingPrice: '', v4Retail: ''
      });

      const [quoteItems, setQuoteItems] = useState([]);
      const [quoteDraft, setQuoteDraft] = useState({ productId: '', variantId: 'v1', priceType: 'dealerBox', qty: 1 });
      const [quoteDiscounts, setQuoteDiscounts] = useState({ d1Name: 'Discount 1', d1: 0, d1Active: false, d2Name: 'Discount 2', d2: 0, d2Active: false });
      const [applyVat, setApplyVat] = useState(true);
      const [importedFileName, setImportedFileName] = useState(null);

      // --- LOCAL STORAGE ---
      useEffect(() => {
        const loadSavedData = async () => {
          try {
            let data = null;
            if (typeof window !== 'undefined' && window.localforage) {
               data = await window.localforage.getItem('vg_pricelist_data');
            }
            if (!data) {
              const oldData = localStorage.getItem('vg_pricelist_data');
              if (oldData) data = JSON.parse(oldData);
            }

            if (data) {
              if (data.categories) setCategories(data.categories);
              if (data.products) setProducts(data.products);
              if (data.headers) setHeaders(data.headers);
              if (data.company) setCompany(data.company);
              if (data.customer) setCustomer(data.customer);
              if (data.salesperson) setSalesperson(data.salesperson);
              if (data.salespersonPhone) setSalespersonPhone(data.salespersonPhone);
            }
          } catch (e) {
            console.error("Error loading saved data", e);
          }
        };
        loadSavedData();
      }, []);

      const handleSaveAll = async () => {
        setIsSaving(true);
        const dataToSave = { categories, products, headers, company, customer, salesperson, salespersonPhone };
        try {
          if (typeof window !== 'undefined' && window.localforage) {
            await window.localforage.setItem('vg_pricelist_data', dataToSave);
          } else {
            localStorage.setItem('vg_pricelist_data', JSON.stringify(dataToSave));
          }
          setTimeout(() => setIsSaving(false), 1500); 
        } catch (error) {
          alert("Error Saving: Your hard drive might be completely full or local storage limit exceeded.");
          console.error(error);
          setIsSaving(false);
        }
      };

      // --- PRINT HANDLER ---
      const handlePrint = () => {
        if (!salesperson || salesperson.trim() === '' || !salespersonPhone || salespersonPhone.trim() === '') {
          alert("Error: Please fill in both the 'Salesperson Name' and 'Phone Number' in the Company Info section before printing or exporting to PDF.");
          if (activeTab !== 'lpPricelist') {
            setActiveTab('lpPricelist');
          }
          return;
        }
        window.print();
      };

      // --- IMPORT / EXPORT DATA ---
      const handleExport = () => {
        if (!salesperson || salesperson.trim() === '' || !salespersonPhone || salespersonPhone.trim() === '') {
          alert("Error: Please fill in both the 'Salesperson Name' and 'Phone Number' before exporting the backup data.");
          if (activeTab !== 'lpPricelist') setActiveTab('lpPricelist');
          return;
        }
        const dataToExport = { categories, products, headers, company, customer, salesperson, salespersonPhone };
        const blob = new Blob([JSON.stringify(dataToExport)], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `VG_Pricelist_Backup_${new Date().toISOString().split('T')[0]}.vgbackup`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      };

      const handleImport = async (e) => {
        const fileInput = e.target;
        const file = fileInput.files[0];
        if (!file) return;
        
        const fileName = file.name;
        const reader = new FileReader();
        
        reader.onload = async (event) => {
          let importedData = null;
          try {
            const fileContent = event.target.result;
            if (fileContent.includes("<!DOCTYPE html>") || fileContent.includes("<html")) {
              alert("Error: It looks like you selected the HTML program file instead of the Backup Data file.");
              fileInput.value = ''; 
              return;
            }
            importedData = JSON.parse(fileContent);
          } catch (error) {
            alert("Error: The backup file is corrupted or invalid. Please select a valid .vgbackup or .json file.");
            console.error("Parse Error:", error);
            fileInput.value = '';
            return;
          }
          
          if (importedData) {
            if (importedData.categories) setCategories(importedData.categories);
            if (importedData.products) setProducts(importedData.products);
            if (importedData.headers) setHeaders(importedData.headers);
            if (importedData.company) setCompany(importedData.company);
            if (importedData.customer) setCustomer(importedData.customer);
            if (importedData.salesperson) setSalesperson(importedData.salesperson);
            if (importedData.salespersonPhone) setSalespersonPhone(importedData.salespersonPhone);

            try {
              if (typeof window !== 'undefined' && window.localforage) {
                await window.localforage.setItem('vg_pricelist_data', importedData);
              } else {
                localStorage.setItem('vg_pricelist_data', JSON.stringify(importedData));
              }
              setImportedFileName(fileName);
              alert("Import successful! All products, prices, and photos have been restored.");
            } catch (storageError) {
              alert("Data displayed! However, we could not save it permanently to this computer.");
            }
          }
          fileInput.value = '';
        };
        reader.onerror = () => { alert("Error reading file."); fileInput.value = ''; };
        reader.readAsText(file);
      };

      // --- HANDLERS: App Data ---
      const updateCategory = (id, field, value) => setCategories(categories.map(c => c.id === id ? { ...c, [field]: field === 'discount' ? parseFloat(value) || 0 : value } : c));
      const addCategory = () => setCategories([...categories, { id: Date.now().toString(), name: 'New Discount', discount: 0 }]);
      const removeCategory = (id) => {
        setCategories(categories.filter(c => c.id !== id));
        setProducts(products.map(p => p.categoryId === id ? { ...p, categoryId: '' } : p));
      };
      const updateProductCategory = (productId, categoryId) => setProducts(products.map(p => p.id === productId ? { ...p, categoryId } : p));
      
      const getDiscountedPrice = (basePrice, categoryId) => {
        const category = categories.find(c => c.id === categoryId);
        const discountedPrice = basePrice * (1 - ((category ? category.discount : 0) / 100));
        return (Math.ceil(discountedPrice * 100) / 100).toFixed(2);
      };

      const executeDeleteProduct = () => {
        if (productToDelete) { setProducts(products.filter(p => p.id !== productToDelete)); setProductToDelete(null); }
      };

      const moveProductUp = (index) => {
        if (index === 0) return;
        const newProducts = [...products];
        const temp = newProducts[index];
        newProducts[index] = newProducts[index - 1];
        newProducts[index - 1] = temp;
        setProducts(newProducts);
      };

      const moveProductDown = (index) => {
        if (index === products.length - 1) return;
        const newProducts = [...products];
        const temp = newProducts[index];
        newProducts[index] = newProducts[index + 1];
        newProducts[index + 1] = temp;
        setProducts(newProducts);
      };

      const handleCompanyLogoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => setCompany({ ...company, logo: reader.result });
          reader.readAsDataURL(file);
        }
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => setNewProduct({ ...newProduct, image: reader.result });
          reader.readAsDataURL(file);
        }
      };

      const handleAddProductSubmit = (e) => {
        e.preventDefault();
        const productToAdd = {
          id: Date.now(),
          name: newProduct.name || 'Unnamed Product',
          categoryId: newProduct.categoryId || categories[0]?.id,
          image: newProduct.image || `https://placehold.co/200x200/f8fafc/94a3b8?text=Image`,
          packQty: newProduct.packQty || '-',
          unit: newProduct.unit || '-',
          prices: {
            v1: { dealerBox: parseFloat(newProduct.v1DealerBox) || 0, dealerUnbox: parseFloat(newProduct.v1DealerUnbox) || 0, sellingPrice: parseFloat(newProduct.v1SellingPrice) || 0, retail: parseFloat(newProduct.v1Retail) || 0 },
            v2: { dealerBox: parseFloat(newProduct.v2DealerBox) || 0, dealerUnbox: parseFloat(newProduct.v2DealerUnbox) || 0, sellingPrice: parseFloat(newProduct.v2SellingPrice) || 0, retail: parseFloat(newProduct.v2Retail) || 0 },
            v3: { dealerBox: parseFloat(newProduct.v3DealerBox) || 0, dealerUnbox: parseFloat(newProduct.v3DealerUnbox) || 0, sellingPrice: parseFloat(newProduct.v3SellingPrice) || 0, retail: parseFloat(newProduct.v3Retail) || 0 },
            v4: { dealerBox: parseFloat(newProduct.v4DealerBox) || 0, dealerUnbox: parseFloat(newProduct.v4DealerUnbox) || 0, sellingPrice: parseFloat(newProduct.v4SellingPrice) || 0, retail: parseFloat(newProduct.v4Retail) || 0 }
          }
        };
        setProducts([...products, productToAdd]);
        setIsModalOpen(false);
      };

      // --- HANDLERS: Quotation ---
      const addQuoteItem = () => {
        if (!quoteDraft.productId) return;
        const item = { id: Date.now().toString(), ...quoteDraft };
        setQuoteItems([...quoteItems, item]);
        setQuoteDraft({ ...quoteDraft, qty: 1 });
      };

      const removeQuoteItem = (id) => setQuoteItems(quoteItems.filter(i => i.id !== id));
      const updateQuoteItemQty = (id, qty) => setQuoteItems(quoteItems.map(i => i.id === id ? { ...i, qty: parseFloat(qty) || 0 } : i));

      const draftProduct = products.find(p => p.id.toString() === quoteDraft.productId.toString());
      
      let draftRawPrice = 0;
      if (draftProduct) {
        const pPrices = draftProduct.prices[quoteDraft.variantId];
        if (quoteDraft.priceType === 'dealerBox') draftRawPrice = pPrices.dealerBox ?? pPrices.dealer ?? 0;
        else if (quoteDraft.priceType === 'dealerUnbox') draftRawPrice = pPrices.dealerUnbox ?? pPrices.dealer ?? 0;
        else if (quoteDraft.priceType === 'sellingPrice') draftRawPrice = pPrices.sellingPrice ?? pPrices.retail ?? 0;
        else draftRawPrice = pPrices.retail ?? 0;
      }

      const draftUnitPrice = draftProduct && quoteDraft.priceType === 'dealerBox'
        ? getDiscountedPrice(draftRawPrice, draftProduct.categoryId)
        : draftRawPrice ? parseFloat(draftRawPrice).toFixed(2) : '0.00';

      const calculateQuoteTotals = () => {
        let subtotal = 0;
        quoteItems.forEach(item => {
          const p = products.find(prod => prod.id.toString() === item.productId.toString());
          if (p) {
            const pPrices = p.prices[item.variantId];
            let rawPrice = 0;
            if (item.priceType === 'dealerBox') rawPrice = pPrices.dealerBox ?? pPrices.dealer ?? 0;
            else if (item.priceType === 'dealerUnbox') rawPrice = pPrices.dealerUnbox ?? pPrices.dealer ?? 0;
            else if (item.priceType === 'sellingPrice') rawPrice = pPrices.sellingPrice ?? pPrices.retail ?? 0;
            else rawPrice = pPrices.retail ?? 0;

            const unitPrice = item.priceType === 'dealerBox' 
              ? parseFloat(getDiscountedPrice(rawPrice, p.categoryId))
              : parseFloat(rawPrice);
              
            subtotal += unitPrice * item.qty;
          }
        });

        const d1Amount = quoteDiscounts.d1Active ? subtotal * (quoteDiscounts.d1 / 100) : 0;
        const afterD1 = subtotal - d1Amount;
        
        const d2Amount = quoteDiscounts.d2Active ? afterD1 * (quoteDiscounts.d2 / 100) : 0;
        const afterD2 = afterD1 - d2Amount;
        
        const vatAmount = applyVat ? afterD2 * 0.07 : 0;
        const grandTotalRaw = afterD2 + vatAmount;
        const grandTotal = Math.ceil(grandTotalRaw * 100) / 100;

        return { subtotal, d1Amount, afterD1, d2Amount, afterD2, vatAmount, grandTotal };
      };

      const totals = calculateQuoteTotals();

      // --- REUSABLE PRINT HEADER - LUXURY EDITION ---
      const PrintHeader = ({ title, subtitle, showCustomerInfo }) => (
        <div className="hidden print:block mb-6 w-full relative">
          {/* Subtle top accent bar */}
          <div className="absolute top-0 left-0 w-full h-[3px] bg-slate-900"></div>
          
          <div className="flex justify-between items-start pt-6 pb-6 border-b border-gray-300 mb-6">
            <div className="flex items-center gap-6">
              {company.logo && <img src={company.logo} alt="Logo" className="w-24 h-24 object-contain" />}
              <div className="flex-1 mt-1">
                <h1 className="text-2xl font-extrabold text-slate-900 tracking-tight leading-tight">{company.name}</h1>
                <p className="text-[11px] text-gray-600 mt-2 whitespace-pre-wrap leading-relaxed">{company.address}</p>
                <p className="text-[11px] text-gray-600 mt-0.5">{company.contact}</p>
              </div>
            </div>
            <div className="text-right mt-1 flex flex-col justify-start">
              <h2 className="text-2xl font-black text-slate-900 uppercase tracking-widest">{title}</h2>
              {subtitle && <p className="text-sm font-bold text-gray-500 tracking-widest mt-1">{subtitle}</p>}
              <p className="text-xs font-semibold text-gray-800 mt-4">Date: <span className="font-normal">{new Date().toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</span></p>
            </div>
          </div>
          
          {showCustomerInfo && (
            <div className="mb-6 flex">
              <div className="w-2/3 border-l-4 border-slate-800 pl-4 py-1">
                <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Customer / ลูกค้า</h3>
                <p className="text-sm font-bold text-slate-900">{customer.name || '__________________________________________'}</p>
                <p className="text-[11px] text-slate-600 mt-1.5">{customer.address || '___________________________________________________________________'}</p>
                <p className="text-[11px] text-slate-600 mt-1">{customer.contact || '__________________________________________'}</p>
              </div>
            </div>
          )}
        </div>
      );

      // --- REUSABLE PRINT FOOTER SIGNATURE - LUXURY EDITION ---
      const PrintFooterSignature = () => (
        <div className="hidden print:block mt-12 pt-6 page-break-inside-avoid relative">
          <div className="absolute top-0 left-12 right-12 border-t border-gray-300"></div>
          <div className="flex justify-between text-center px-16 items-start">
            <div className="w-64 flex flex-col items-center">
              <div className="h-20 w-full"></div> {/* Space for physical signature */}
              <div className="border-b border-gray-400 w-56 mb-2"></div>
              <p className="text-sm font-extrabold text-slate-900">{salesperson}</p>
              <p className="text-[10px] text-gray-600 mt-0.5">เบอร์ติดต่อ: {salespersonPhone}</p>
              <p className="text-[10px] text-slate-500 mt-1.5 uppercase tracking-wider font-semibold">Salesperson</p>
            </div>
            <div className="w-64 flex flex-col items-center">
              <div className="h-20 w-full"></div> {/* Space for physical signature */}
              <div className="border-b border-gray-400 w-56 mb-2"></div>
              <p className="text-[10px] text-slate-500 mt-1.5 uppercase tracking-wider font-semibold">Authorized Signature</p>
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-gray-100 text-slate-800 font-sans pb-12 relative">
          
          {/* PRINT ONLY: Repeating Header */}
          <div className="hidden print:block fixed top-0 right-0 text-[8px] text-gray-400 z-50 pt-2 font-medium tracking-wider">
            Printed: {new Date().toLocaleString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })}
          </div>

          {/* TOP NAVIGATION */}
          <header className="bg-blue-900 text-white shadow-md print:hidden sticky top-0 z-30">
            <div className="max-w-[1400px] mx-auto px-4 flex justify-between items-center h-16">
              <div className="flex items-center gap-3">
                <i className="fas fa-image text-blue-300 text-2xl"></i>
                <span className="text-xl font-bold tracking-wide">Pricelist Manager</span>
                {importedFileName && (
                  <span className="ml-3 hidden lg:inline-flex items-center gap-1.5 bg-blue-800 text-blue-200 text-[11px] px-2.5 py-1 rounded border border-blue-700 shadow-inner" title="Currently loaded file">
                    <i className="fas fa-file-import"></i> {importedFileName}
                  </span>
                )}
              </div>
              
              <div className="flex space-x-1 bg-blue-950 p-1 rounded-lg">
                <button 
                  onClick={() => setActiveTab('lpPricelist')}
                  className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium transition-colors ${activeTab === 'lpPricelist' ? 'bg-blue-600 text-white shadow' : 'text-blue-200 hover:text-white hover:bg-blue-800'}`}
                >
                  <i className="fas fa-list text-[14px]"></i> LP Pricelist
                </button>
                <button 
                  onClick={() => setActiveTab('simplePricelist')}
                  className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium transition-colors ${activeTab === 'simplePricelist' ? 'bg-blue-600 text-white shadow' : 'text-blue-200 hover:text-white hover:bg-blue-800'}`}
                >
                  <i className="fas fa-file-alt text-[14px]"></i> Simple Pricelist
                </button>
                <button 
                  onClick={() => setActiveTab('quotation')}
                  className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium transition-colors ${activeTab === 'quotation' ? 'bg-blue-600 text-white shadow' : 'text-blue-200 hover:text-white hover:bg-blue-800'}`}
                >

                    className={`w-full text-sm p-2 border rounded outline-none ${activeTab !== 'lpPricelist' ? 'bg-gray-100 text-gray-500 cursor-not-allowed' : 'focus:border-blue-500'}`} 
                    placeholder="Company Name" 
                  />
                  <textarea 
                    value={company.address} 
                    onChange={e => setCompany({...company, address: e.target.value})} 
                    disabled={activeTab !== 'lpPricelist'} 
                    className={`w-full text-sm p-2 border rounded outline-none h-24 resize-none ${activeTab !== 'lpPricelist' ? 'bg-gray-100 text-gray-500 cursor-not-allowed' : 'focus:border-blue-500'}`} 
                    placeholder="Address & Tax ID" 
                  />
                  <input 
                    type="text" 
                    value={company.contact} 
                    onChange={e => setCompany({...company, contact: e.target.value})} 
                    disabled={activeTab !== 'lpPricelist'} 
                    className={`w-full text-sm p-2 border rounded outline-none ${activeTab !== 'lpPricelist' ? 'bg-gray-100 text-gray-500 cursor-not-allowed' : 'focus:border-blue-500'}`} 
                    placeholder="Contact Info" 
                  />
                  <div className="flex items-center gap-3">
                    {company.logo && <img src={company.logo} alt="Logo" className="w-10 h-10 object-contain border rounded bg-gray-50" />}

                      <label className="flex-1 cursor-pointer bg-gray-50 hover:bg-gray-100 border border-gray-300 text-gray-700 text-xs font-medium py-2 px-3 rounded text-center transition-colors">

                      <div className="flex-1 bg-gray-100 border border-gray-200 text-gray-400 text-xs font-medium py-2 px-3 rounded text-center cursor-not-allowed">

                      placeholder="Required for PDF Export" 
                    />
                  </div>

                  {/* Salesperson Phone Box */}
                  <div className="mt-2">
                    <label className="block text-[11px] font-bold text-gray-700 mb-1">

                      placeholder="Required for PDF Export" 
                    />
                  </div>

                                {categories.map(c => <option key={c.id} value={c.id}>{c.name} ({c.discount}%)</option>)}
                              </select>
                            </td>
                            {/* Pack Size +25% */}
                            <td className="p-2 text-center border-r border-gray-200 align-middle">
                              <p className="font-bold text-[15px] text-slate-800 print:text-[13px]">{product.packQty}</p>
                              <p className="text-[11px] text-slate-500 font-medium print:text-[10px]">{product.unit}</p>
                            </td>
                            {/* Prices +10% */}
                            {['v1', 'v2', 'v3', 'v4'].map((v, i) => {
                              const pData = product.prices[v];
                              const dealerBoxPriceStr = getDiscountedPrice(pData.dealerBox ?? pData.dealer ?? 0, product.categoryId);
                              const packQtyNum = parseFloat(product.packQty) || 0;
                              const boxTotalFormatted = (parseFloat(dealerBoxPriceStr) * packQtyNum).toLocaleString('en-US', {minimumFractionDigits: 2});
                              
                              return (
                                <td key={v} className={`p-2 border-r border-gray-200 align-middle ${i%2===0 ? 'bg-slate-50/50' : 'bg-white'}`}>
                                  <div className="flex flex-col justify-between items-center h-full space-y-1.5 print:space-y-2.5 py-1.5">
                                    <div className="text-center w-full">
                                      <span className="text-[9px] text-gray-500 uppercase font-semibold print:text-[7px] block mb-0.5">Dealer (ครบลัง)</span>

                                        {packQtyNum > 0 && <span className="text-[10px] text-slate-600 font-medium ml-1 print:text-[9px]">({boxTotalFormatted})</span>}
                                      </span>
                                    </div>
                                    <div className="w-[90%] border-b border-dotted border-gray-300"></div>

                                    <div className="w-[90%] border-b border-dotted border-gray-300"></div>
                                    <div className="text-center w-full">
                                      <span className="text-[9px] text-emerald-700 uppercase font-bold print:text-[7px] block mb-0.5">Selling Price (แนะนำขาย)</span>
                                      <span className="font-bold text-emerald-700 text-[11px] print:text-[9px]">฿{parseFloat(pData.sellingPrice ?? pData.retail ?? 0).toFixed(2)}</span>
                                    </div>
                                    <div className="w-[90%] border-b border-dotted border-gray-300"></div>
                                    <div className="text-center w-full">
                                      <span className="text-[9px] text-slate-500 uppercase print:text-[7px] font-medium block mb-0.5">List Price (ราคาตั้ง)</span>

                                    </div>
                                  </div>
                                </td>
                              );
                            })}
                            <td className="p-2 text-center print:hidden border-r-0 align-middle">

                                    disabled={index === 0} 
                                    className="p-1 bg-gray-200 text-gray-600 rounded hover:bg-blue-100 hover:text-blue-600 disabled:opacity-30 disabled:cursor-not-allowed"

                                  >

                                  </button>
                                  <button 
                                    onClick={() => moveProductDown(index)} 
                                    disabled={index === products.length - 1} 
                                    className="p-1 bg-gray-200 text-gray-600 rounded hover:bg-blue-100 hover:text-blue-600 disabled:opacity-30 disabled:cursor-not-allowed"

                                  >
                                    <i className="fas fa-chevron-down text-[12px] w-4"></i>

                                  title="Remove Product"
                                >
                                  <i className="fas fa-trash text-[14px]"></i>
                                </button>
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <PrintFooterSignature />
                </div>

                  <div className="overflow-x-auto print:overflow-visible">
                    <table className="w-full text-left border-collapse min-w-[900px] print:min-w-0">
                      <thead>
                        {/* Luxury Dark Header - Reverted Text Size */}
                        <tr className="bg-slate-900 text-white text-sm print:text-[11px] uppercase tracking-wider align-middle text-center">
                          <th className="p-3 font-bold text-center align-middle border-r border-slate-800 print:w-[28%]">
                            Products
                            <span className="block text-[10px] font-normal text-gray-300 print:text-[9px] mt-0.5">(รายการสินค้า)</span>
                          </th>
                          <th className="p-3 font-bold text-center align-middle w-20 border-r border-slate-800 print:w-[12%]">
                            Pack Size
                            <span className="block text-[10px] font-normal text-gray-300 print:text-[9px] mt-0.5">(ขนาดแพ็ค)</span>
                          </th>
                          {['v1', 'v2', 'v3', 'v4'].map((v, i) => (

                              <img src={product.image} alt="" className="w-24 h-24 print:w-16 print:h-16 object-contain rounded border border-gray-200 my-2 print:mx-auto" />
                              <p className="mt-1 text-[11px] text-slate-700 bg-slate-100 border border-slate-200 rounded px-1.5 py-0.5 inline-block print:hidden">
                                {categories.find(c => c.id === product.categoryId)?.name} ({categories.find(c => c.id === product.categoryId)?.discount}%)

                            {['v1', 'v2', 'v3', 'v4'].map((v, i) => {

                  <PrintHeader title="QUOTATION" subtitle="(ใบเสนอราคา)" showCustomerInfo={true} />

                  <div className="print:hidden bg-blue-50 border border-blue-100 rounded-lg p-5 mb-8 shadow-sm">
                    <h3 className="text-sm font-bold text-blue-900 mb-4 flex items-center gap-2"><i className="fas fa-plus text-[16px]"></i> Add Items to Quotation</h3>
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-3 items-end">
                      
                      <div className="lg:col-span-3">
                        <label className="block text-[11px] font-bold text-gray-600 mb-1">Select Product</label>
                        <select value={quoteDraft.productId} onChange={e => setQuoteDraft({...quoteDraft, productId: e.target.value})} className="w-full p-2 text-sm border rounded outline-none focus:border-blue-500 bg-white">
                          <option value="">-- Choose Product --</option>
                          {products.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                        </select>
                      </div>
                      
                      <div className="lg:col-span-2">
                        <label className="block text-[11px] font-bold text-gray-600 mb-1">Color Variant</label>
                        <select value={quoteDraft.variantId} onChange={e => setQuoteDraft({...quoteDraft, variantId: e.target.value})} className="w-full p-2 text-sm border rounded outline-none focus:border-blue-500 bg-white">
                          <option value="v1">{headers.v1}</option>
                          <option value="v2">{headers.v2}</option>
                          <option value="v3">{headers.v3}</option>
                          <option value="v4">{headers.v4}</option>
                        </select>
                      </div>

                      <div className="lg:col-span-2">
                        <label className="block text-[11px] font-bold text-gray-500 mb-1">Pack Size</label>
                        <div className="w-full p-2 text-xs border border-gray-200 bg-gray-100 rounded text-gray-600 h-[38px] flex items-center overflow-hidden whitespace-nowrap">
                          {draftProduct ? `${draftProduct.packQty} ${draftProduct.unit}` : '-'}
                        </div>
                      </div>

                      <div className="lg:col-span-2">
                        <label className="block text-[11px] font-bold text-gray-600 mb-1">Price Level</label>
                        <select value={quoteDraft.priceType} onChange={e => setQuoteDraft({...quoteDraft, priceType: e.target.value})} className="w-full p-2 text-sm border rounded outline-none focus:border-blue-500 bg-white">
                          <option value="dealerBox">Dealer (ครบลัง)</option>
                          <option value="dealerUnbox">Dealer (ไม่ครบลัง)</option>
                          <option value="sellingPrice">Selling Price (แนะนำขาย)</option>
                          <option value="retail">List Price (ราคาตั้ง)</option>
                        </select>
                      </div>

                      <div className="lg:col-span-1">
                        <label className="block text-[11px] font-bold text-blue-600 mb-1">Unit Price</label>
                        <div className="w-full p-2 text-sm border border-blue-200 bg-blue-100 rounded text-blue-800 font-bold h-[38px] flex items-center justify-center">
                          {draftUnitPrice}
                        </div>
                      </div>

                      <div className="lg:col-span-2 flex gap-2">
                        <div className="w-1/3">
                          <label className="block text-[11px] font-bold text-gray-600 mb-1">Qty</label>
                          <input type="number" min="1" value={quoteDraft.qty} onChange={e => setQuoteDraft({...quoteDraft, qty: parseInt(e.target.value)||1})} className="w-full p-2 text-sm border rounded outline-none focus:border-blue-500 h-[38px]" />
                        </div>
                        <button onClick={addQuoteItem} disabled={!quoteDraft.productId} className="w-2/3 bg-blue-600 text-white p-2 text-sm font-bold rounded hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors h-[38px]">
                          Add
                        </button>
                      </div>
                    </div>
                  </div>

                  <div className="border border-gray-300 rounded-lg overflow-hidden mt-6 print:overflow-visible print:border-none">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-slate-900 text-white text-sm align-middle text-center uppercase tracking-wider">
                          <th className="p-3 font-bold w-12 text-center align-middle border-r border-slate-800 print:w-[5%]">#</th>
                          <th className="p-3 font-bold text-center align-middle border-r border-slate-800 print:w-[25%]">
                            Products
                            <span className="block text-[10px] font-normal text-gray-300 print:text-[8px] mt-0.5">(รายการสินค้า)</span>
                          </th>
                          <th className="p-3 font-bold text-center w-28 align-middle border-r border-slate-800 print:w-[12%]">
                            Variant
                            <span className="block text-[10px] font-normal text-gray-300 print:text-[8px] mt-0.5">(สี)</span>
                          </th>
                          <th className="p-3 font-bold text-center w-28 align-middle border-r border-slate-800 print:w-[10%]">
                            Pack Size
                            <span className="block text-[10px] font-normal text-gray-300 print:text-[8px] mt-0.5">(ขนาดแพ็ค)</span>
                          </th>
                          <th className="p-3 font-bold text-center w-24 align-middle border-r border-slate-800 print:w-[10%]">
                            LP
                            <span className="block text-[10px] font-normal text-gray-300 print:text-[8px] mt-0.5">(ราคาตั้ง)</span>
                          </th>
                          <th className="p-3 font-bold text-center w-24 align-middle border-r border-slate-800 print:w-[10%]">
                            Discount
                            <span className="block text-[10px] font-normal text-gray-300 print:text-[8px] mt-0.5">(ส่วนลด) %</span>
                          </th>
                          <th className="p-3 font-bold text-center w-32 align-middle border-r border-slate-800 print:w-[12%]">
                            Unit Price
                            <span className="block text-[10px] font-normal text-gray-300 print:text-[8px] mt-0.5">(ราคาต่อหน่วย)</span>
                          </th>
                          <th className="p-3 font-bold text-center w-20 align-middle border-r border-slate-800 print:w-[6%]">
                            Qty
                            <span className="block text-[10px] font-normal text-gray-300 print:text-[8px] mt-0.5">(จำนวน)</span>
                          </th>
                          <th className="p-3 font-bold text-center w-32 align-middle border-r border-slate-800 print:w-[10%]">
                            Total (฿)
                            <span className="block text-[10px] font-normal text-gray-300 print:text-[8px] mt-0.5">(ยอดรวม)</span>
                          </th>
                          <th className="p-3 w-10 text-center print:hidden align-middle"></th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-200">
                        {quoteItems.length === 0 ? (
                          <tr><td colSpan="10" className="p-8 text-center text-gray-400 italic">No items added to quotation yet.</td></tr>
                        ) : (
                          quoteItems.map((item, index) => {
                            const product = products.find(p => p.id.toString() === item.productId.toString());
                            if(!product) return null;
                            
                            const pPrices = product.prices[item.variantId];
                            let rawPrice = 0;
                            let priceLabel = '';
                            if (item.priceType === 'dealerBox') { rawPrice = pPrices.dealerBox ?? pPrices.dealer ?? 0; priceLabel = 'Dealer (ครบลัง)'; }
                            else if (item.priceType === 'dealerUnbox') { rawPrice = pPrices.dealerUnbox ?? pPrices.dealer ?? 0; priceLabel = 'Dealer (ไม่ครบลัง)'; }
                            else if (item.priceType === 'sellingPrice') { rawPrice = pPrices.sellingPrice ?? pPrices.retail ?? 0; priceLabel = 'Selling Price (แนะนำขาย)'; }
                            else { rawPrice = pPrices.retail ?? 0; priceLabel = 'List Price (ราคาตั้ง)'; }

                            const lpPrice = pPrices.retail ?? 0;
                            const discountPercent = categories.find(c => c.id === product.categoryId)?.discount || 0;

                            const unitPrice = item.priceType === 'dealerBox' 
                              ? parseFloat(getDiscountedPrice(rawPrice, product.categoryId))
                              : parseFloat(rawPrice);

                            const lineTotal = unitPrice * item.qty;

                            return (
                              <tr key={item.id} className="text-sm page-break-inside-avoid bg-white">
                                <td className="p-3 text-center text-gray-500 align-middle">{index + 1}</td>
                                <td className="p-3 font-bold text-slate-900 align-middle">{product.name}</td>
                                <td className="p-3 text-center align-middle">
                                  <span className="text-slate-800 font-bold">{headers[item.variantId]}</span><br/>
                                  <span className="text-[9px] text-gray-400 uppercase print:hidden">{priceLabel}</span>
                                </td>
                                <td className="p-3 text-center align-middle">
                                  <span className="font-bold text-slate-800 block leading-tight">{product.packQty}</span>
                                  <span className="text-[10px] text-gray-500 font-medium">{product.unit}</span>
                                </td>
                                <td className="p-3 text-right text-slate-700 align-middle">{parseFloat(lpPrice).toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                                <td className="p-3 text-center text-slate-700 align-middle font-semibold">{discountPercent}%</td>
                                <td className="p-3 text-right text-slate-900 font-bold align-middle">{unitPrice.toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                                <td className="p-3 text-center align-middle">
                                  <input 
                                    type="number" value={item.qty} 
                                    onChange={(e) => updateQuoteItemQty(item.id, e.target.value)}
                                    className="w-16 text-center border rounded p-1 print:border-none print:appearance-none print:bg-transparent bg-gray-50 focus:bg-white focus:ring-1 focus:ring-blue-500 outline-none font-bold text-slate-900" 
                                  />
                                </td>
                                <td className="p-3 text-right font-black text-slate-900 align-middle">{lineTotal.toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                                <td className="p-3 text-center print:hidden align-middle">
                                  <button onClick={() => removeQuoteItem(item.id)} className="text-red-400 hover:text-red-600"><i className="fas fa-trash text-[16px]"></i></button>
                                </td>
                              </tr>
                            );
                          })
                        )}
                      </tbody>
                    </table>

                    {/* Luxury Invoice Totals Section */}
                    <div className="bg-white border-t-2 border-slate-900 p-6 flex justify-end page-break-inside-avoid print:px-0">
                      <div className="w-full max-w-sm space-y-2 text-sm pr-2">
                        <div className="flex justify-between items-center py-1">
                          <span className="font-semibold text-slate-600 uppercase tracking-wide text-[11px]">Subtotal</span>
                          <span className="font-bold text-slate-900">฿ {totals.subtotal.toLocaleString('en-US', {minimumFractionDigits: 2})}</span>
                        </div>

                        <div className={`flex justify-between items-center py-1 text-red-600 group ${!quoteDiscounts.d1Active ? 'print:hidden opacity-40' : ''}`}>
                          <div className="flex items-center gap-2">
                            <input 
                              type="checkbox" 
                              checked={quoteDiscounts.d1Active} 
                              onChange={e => setQuoteDiscounts({...quoteDiscounts, d1Active: e.target.checked})} 
                              className="print:hidden rounded text-red-600 focus:ring-red-500 cursor-pointer" 
                            />
                            <input 
                              type="text" 
                              value={quoteDiscounts.d1Name} 
                              onChange={e => setQuoteDiscounts({...quoteDiscounts, d1Name: e.target.value})} 
                              className="font-medium text-red-600 bg-transparent border-b border-dashed border-transparent hover:border-red-300 focus:border-red-500 outline-none w-32 print:border-none disabled:opacity-70" 
                              disabled={!quoteDiscounts.d1Active}
                            />
                            <span className="text-xs">(%)</span>
                            <input 
                              type="number" 
                              value={quoteDiscounts.d1} 
                              onChange={e => setQuoteDiscounts({...quoteDiscounts, d1: parseFloat(e.target.value)||0})} 
                              className="w-12 text-right border rounded p-0.5 print:border-none print:bg-transparent bg-white text-red-600 focus:outline-none disabled:bg-transparent disabled:opacity-70" 
                              disabled={!quoteDiscounts.d1Active}
                            />
                          </div>
                          <span>- ฿ {totals.d1Amount.toLocaleString('en-US', {minimumFractionDigits: 2})}</span>
                        </div>

                        <div className={`flex justify-between items-center py-1 text-red-600 border-b border-gray-200 pb-2 group ${!quoteDiscounts.d2Active ? 'print:hidden opacity-40' : ''}`}>
                          <div className="flex items-center gap-2">
                            <input 
                              type="checkbox" 
                              checked={quoteDiscounts.d2Active} 
                              onChange={e => setQuoteDiscounts({...quoteDiscounts, d2Active: e.target.checked})} 
                              className="print:hidden rounded text-red-600 focus:ring-red-500 cursor-pointer" 
                            />
                            <input 
                              type="text" 
                              value={quoteDiscounts.d2Name} 
                              onChange={e => setQuoteDiscounts({...quoteDiscounts, d2Name: e.target.value})} 
                              className="font-medium text-red-600 bg-transparent border-b border-dashed border-transparent hover:border-red-300 focus:border-red-500 outline-none w-32 print:border-none disabled:opacity-70" 
                              disabled={!quoteDiscounts.d2Active}
                            />
                            <span className="text-xs">(%)</span>
                            <input 
                              type="number" 
                              value={quoteDiscounts.d2} 
                              onChange={e => setQuoteDiscounts({...quoteDiscounts, d2: parseFloat(e.target.value)||0})} 
                              className="w-12 text-right border rounded p-0.5 print:border-none print:bg-transparent bg-white text-red-600 focus:outline-none disabled:bg-transparent disabled:opacity-70" 
                              disabled={!quoteDiscounts.d2Active}
                            />
                          </div>
                          <span>- ฿ {totals.d2Amount.toLocaleString('en-US', {minimumFractionDigits: 2})}</span>
                        </div>

                        <div className={`flex justify-between items-center py-2 ${!quoteDiscounts.d1Active && !quoteDiscounts.d2Active ? 'print:hidden' : ''}`}>
                          <span className="font-semibold text-slate-600 uppercase tracking-wide text-[11px]">Total After Discounts</span>
                          <span className="font-bold text-slate-900">฿ {totals.afterD2.toLocaleString('en-US', {minimumFractionDigits: 2})}</span>
                        </div>

                        <div className={`flex justify-between items-center py-2 border-b border-gray-300 pb-4 ${!applyVat ? 'print:hidden opacity-40' : ''}`}>
                          <label className="flex items-center gap-2 font-semibold text-slate-600 uppercase tracking-wide text-[11px] cursor-pointer">
                            <input type="checkbox" checked={applyVat} onChange={(e) => setApplyVat(e.target.checked)} className="print:hidden rounded text-blue-600 focus:ring-blue-500" />
                            <span>VAT (7%)</span>
                          </label>
                          <span className="font-bold text-slate-900">฿ {totals.vatAmount.toLocaleString('en-US', {minimumFractionDigits: 2})}</span>
                        </div>

                        <div className="flex justify-between items-center pt-3 text-lg border-b-4 border-double border-slate-900 pb-1">
                          <span className="font-black text-slate-900 uppercase tracking-widest text-[14px]">Grand Total</span>
                          <span className="font-black text-slate-900">฿ {totals.grandTotal.toLocaleString('en-US', {minimumFractionDigits: 2})}</span>
                        </div>
                      </div>
                    </div>
                  </div>
                  
                  <PrintFooterSignature />
                </div>
              )}
            </section>
          </main>

          {/* --- ADD PRODUCT MODAL --- */}
          {isModalOpen && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 print:hidden">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-[1200px] max-h-[90vh] overflow-y-auto">
                <div className="flex justify-between items-center p-5 border-b border-gray-200 sticky top-0 bg-white z-10 shadow-sm">
                  <h3 className="text-xl font-bold text-gray-900">Add New Product</h3>
                  <button onClick={() => setIsModalOpen(false)} className="text-gray-400 hover:text-gray-700"><i className="fas fa-times text-[24px]"></i></button>
                </div>
                
                <form onSubmit={handleAddProductSubmit} className="p-6 space-y-6 bg-gray-50">
                  
                  <div className="grid grid-cols-1 md:grid-cols-4 gap-4 bg-white p-5 rounded-lg shadow-sm border border-gray-100">
                    
                    <div className="md:col-span-1 border-r border-gray-100 pr-4 flex flex-col items-center justify-center">
                      <label className="block text-xs font-bold text-gray-700 mb-2 w-full text-left">Product Image</label>
                      <div className="w-32 h-32 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center bg-gray-50 relative overflow-hidden group">
                        {newProduct.image ? (
                          <img src={newProduct.image} alt="Preview" className="w-full h-full object-contain p-1" />
                        ) : (
                          <div className="text-center text-gray-400">
                            <i className="fas fa-image text-[32px] mx-auto mb-1 opacity-50"></i>
                            <span className="text-[10px] block mt-1">Upload</span>
                          </div>
                        )}
                        <input 
                          type="file" 
                          accept="image/*"
                          onChange={handleImageUpload}
                          className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                        />
                        <div className="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center pointer-events-none">
                          <i className="fas fa-upload text-white text-[20px]"></i>
                        </div>
                      </div>
                      <p className="text-[9px] text-gray-400 mt-2 text-center">Click to upload image file.</p>
                    </div>

                    <div className="md:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-4 pl-0 md:pl-2">
                      <div className="md:col-span-2">
                        <label className="block text-xs font-bold text-gray-700 mb-1">Product Name</label>
                        <input required type="text" value={newProduct.name} onChange={e => setNewProduct({...newProduct, name: e.target.value})} className="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-blue-500 outline-none" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1">Discount Category</label>
                        <select required value={newProduct.categoryId} onChange={e => setNewProduct({...newProduct, categoryId: e.target.value})} className="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                          <option value="" disabled>Select a category...</option>
                          {categories.map(c => <option key={c.id} value={c.id}>{c.name} ({c.discount}%)</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1">Pack Qty & Unit</label>
                        <div className="flex gap-2">
                          <input type="number" min="0" step="any" placeholder="Qty" value={newProduct.packQty} onChange={e => setNewProduct({...newProduct, packQty: e.target.value})} className="w-1/2 p-2 text-sm border rounded focus:ring-2 focus:ring-blue-500 outline-none" />
                          <input type="text" placeholder="Unit" value={newProduct.unit} onChange={e => setNewProduct({...newProduct, unit: e.target.value})} className="w-1/2 p-2 text-sm border rounded focus:ring-2 focus:ring-blue-500 outline-none" />
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                    {['v1', 'v2', 'v3', 'v4'].map((v) => (
                      <div key={v} className="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                        <h4 className="font-bold text-blue-900 border-b border-gray-100 pb-2 mb-3 text-sm text-center bg-blue-50 py-1 rounded">{headers[v]}</h4>
                        <div className="space-y-2">
                          <div>
                            <label className="block text-[10px] font-bold text-blue-700 uppercase">Dealer (ครบลัง)</label>
                            <input type="number" required={v==='v1'} value={newProduct[`${v}DealerBox`]} onChange={e => setNewProduct({...newProduct, [`${v}DealerBox`]: e.target.value})} className="w-full p-1 text-sm border rounded focus:ring-1 focus:ring-blue-500 outline-none mt-1" />
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold text-blue-500 uppercase">Dealer (ไม่ครบลัง)</label>
                            <input type="number" required={v==='v1'} value={newProduct[`${v}DealerUnbox`]} onChange={e => setNewProduct({...newProduct, [`${v}DealerUnbox`]: e.target.value})} className="w-full p-1 text-sm border rounded focus:ring-1 focus:ring-blue-500 outline-none mt-1" />
                          </div>
                          <div className="border-t border-gray-100 pt-1 mt-1">
                            <label className="block text-[10px] font-bold text-emerald-600 uppercase">Selling Price (แนะนำขาย)</label>
                            <input type="number" required={v==='v1'} value={newProduct[`${v}SellingPrice`]} onChange={e => setNewProduct({...newProduct, [`${v}SellingPrice`]: e.target.value})} className="w-full p-1 text-sm border rounded focus:ring-1 focus:ring-emerald-500 outline-none mt-1" />
                          </div>
                          <div className="border-t border-gray-100 pt-1 mt-1">
                            <label className="block text-[10px] font-bold text-gray-500 uppercase">List Price (ราคาตั้ง)</label>
                            <input type="number" required={v==='v1'} value={newProduct[`${v}Retail`]} onChange={e => setNewProduct({...newProduct, [`${v}Retail`]: e.target.value})} className="w-full p-1 text-sm border rounded focus:ring-1 focus:ring-blue-500 outline-none mt-1" />
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div className="flex justify-end gap-3 pt-4">
                    <button type="button" onClick={() => setIsModalOpen(false)} className="px-5 py-2 text-sm text-gray-600 hover:bg-gray-200 rounded-lg font-bold transition-colors">Cancel</button>
                    <button type="submit" className="px-6 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-md transition-transform active:scale-95">Save Product</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* --- CONFIRM DELETE MODAL --- */}
          {productToDelete && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 print:hidden">
              <div className="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 text-center animate-in zoom-in-95 duration-200">
                <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <i className="fas fa-exclamation-triangle text-red-500 text-[32px]"></i>
                </div>
                <h3 className="text-lg font-bold text-gray-900 mb-2">Delete Product?</h3>
                <p className="text-sm text-gray-600 mb-6 px-2">
                  Are you sure you want to remove <strong>"{products.find(p => p.id === productToDelete)?.name}"</strong>? This action cannot be undone unless you have unsaved data to reload.
                </p>
                <div className="flex justify-center gap-3">
                  <button onClick={() => setProductToDelete(null)} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg font-bold hover:bg-gray-200 transition-colors">Cancel</button>
                  <button onClick={executeDeleteProduct} className="flex-1 py-2.5 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 transition-colors shadow-sm">Yes, Delete</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
