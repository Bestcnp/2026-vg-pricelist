    const deepMergePermissions = (defaultPerms, loadedPerms) => {
        if (!loadedPerms) return { ...defaultPerms };
        const merged = { ...defaultPerms };
        for (const key in defaultPerms) {
            if (typeof defaultPerms[key] === 'object' && defaultPerms[key] !== null) {
                merged[key] = { ...defaultPerms[key], ...(loadedPerms[key] || {}) };
            } else {
                merged[key] = loadedPerms[key] !== undefined ? loadedPerms[key] : defaultPerms[key];
            }
        }
        return merged;
    };

    const flattenObj = (ob, prefix = '') => {
        let result = {};
        for (const i in ob) {
            if (!Object.prototype.hasOwnProperty.call(ob, i)) continue;
            const key = prefix ? `${prefix}.${i}` : i;
            if (typeof ob[i] === 'object' && ob[i] !== null && !Array.isArray(ob[i])) {
                if (i === 'permissions') {
                    result[key] = ob[i]; // Keep deep complex objects intact to prevent huge tables
                } else {
                    Object.assign(result, flattenObj(ob[i], key));
                }
            } else {
                result[key] = ob[i];
            }
        }
        return result;
    };

    const unflattenObj = (flatOb) => {
        let result = {};
        for (const i in flatOb) {
            let keys = i.split('.');
            let current = result;
            for (let j = 0; j < keys.length; j++) {
                let key = keys[j];
                if (j === keys.length - 1) {
                    current[key] = flatOb[i];
                } else {
                    if (!current[key]) current[key] = {};
                    current = current[key];
                }
            }
        }
        return result;

      const getDiscountedPrice = useCallback((basePrice, categoryId) => {

        const discountedPrice = basePrice * (1 - (discount / 100));
        return (Math.ceil(discountedPrice * 100) / 100).toFixed(2);
      }, [categoryDiscountMap]);

      const loadDataIntoState = (data) => {

          if (storedSessionToken && loginTimestamp) {

              if (data) loadDataIntoState(data);
          } catch(e) { console.error("Local Load Error", e); }
          setIsInitializing(false);
      };

      // 1. Establish App Storage Connection
      useEffect(() => {
          if (auth && db) {
              setStorageMode('cloud');
              const initAuth = async () => {
                  try {
                      if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                          await window.fb.signInWithCustomToken(auth, __initial_auth_token);
                      } else {
                          await window.fb.signInAnonymously(auth);
                      }
                  } catch(e) { console.error("Firebase Auth Error", e); loadLocalData(); }
              };
              initAuth();
              const unsubscribe = window.fb.onAuthStateChanged(auth, setFbUser);
              return () => unsubscribe();
          } else {
              setStorageMode('local');
              loadLocalData();
          }
      }, []);

      // 2. Real-time Cloud Sync Subscription
      useEffect(() => {
          if (storageMode !== 'cloud' || !fbUser || !db) return;
          
          const docRef = window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'pricelist_db', 'main_state');
          
          const unsubscribe = window.fb.onSnapshot(docRef, (docSnap) => {
              if (docSnap.exists()) {
                  loadDataIntoState(docSnap.data());
              } else {
                  // Document doesn't exist yet, we rely on local initial state until user hits "Save"
              }
              setIsInitializing(false);
          }, (error) => {
              console.error("Firestore Sync Error", error);
              setIsInitializing(false);
          });

          return () => unsubscribe();
      }, [storageMode, fbUser]);

      useEffect(() => {
          if (currentUser) {
              setSalesperson(currentUser.name);
              setSalespersonPhone(currentUser.phone);
              
              if (!currentUser.permissions.tabs.lpPricelist && activeTab === 'lpPricelist') {
                  if(currentUser.permissions.tabs.simplePricelist) setActiveTab('simplePricelist');
                  else setActiveTab('databases');
              }
              if (!currentUser.permissions.tabs.simplePricelist && activeTab === 'simplePricelist') {
                  setActiveTab('databases');
              }
          }
      }, [currentUser]);

      useEffect(() => {
          if (activeTab === 'databases' && currentUser) {
              const hasAccess = 
                  (dbTab === 'entities' && currentUser.permissions.company.view) ||
                  (dbTab === 'users' && currentUser.permissions.users.view) ||
                  (dbTab === 'config' && currentUser.permissions.masterData.view) ||
                  (dbTab === 'data' && currentUser.permissions.actions.canImportExport) ||
                  (dbTab === 'logs' && currentUser.role === 'admin');
              
              if (!hasAccess) {
                  if (currentUser.permissions.company.view) setDbTab('entities');
                  else if (currentUser.permissions.users.view) setDbTab('users');
                  else if (currentUser.permissions.actions.canImportExport) setDbTab('data');
                  else if (currentUser.permissions.masterData.view) setDbTab('config');
                  else if (currentUser.role === 'admin') setDbTab('logs');
              }
          }
      }, [activeTab, currentUser, dbTab]);

      // --- SESSION MONITORING (12 HOURS) ---
      const handleLogoutRef = useRef(null);

      useEffect(() => {
          handleLogoutRef.current = handleLogout;
      });

      useEffect(() => {
          let interval;
          if (currentUser) {
              interval = setInterval(() => {
                  const loginTimestamp = localStorage.getItem('vg_login_timestamp');
                  if (loginTimestamp) {
                      const TWELVE_HOURS = 12 * 60 * 60 * 1000;
                      if (Date.now() - parseInt(loginTimestamp, 10) > TWELVE_HOURS) {
                          alert("Your session has expired (12 hours limit). Please log in again.");
                          if (handleLogoutRef.current) handleLogoutRef.current();
                      }
                  }
              }, 60000);
          }
          return () => clearInterval(interval);
      }, [currentUser]);

      // When wizard opens or index changes, setup flattened states
      useEffect(() => {
          if (mergeWizard.isOpen && mergeWizard.queue[mergeWizard.currentIndex]) {
              const current = mergeWizard.queue[mergeWizard.currentIndex];
              setWizardExistingFlat(flattenObj(current.existing));
              setWizardImportedFlat(flattenObj(current.imported));
              setWizardDraftFlat(flattenObj(current.draft));
          }
      }, [mergeWizard.isOpen, mergeWizard.currentIndex, mergeWizard.queue]);

      const handleWizardDraftChange = (key, val, originalType) => {
          let parsedVal = val;
          if (originalType === 'number' && val !== '') {
              parsedVal = Number(val);
          } else if (originalType === 'boolean') {
              parsedVal = val === 'true' || val === true;
          }
          setWizardDraftFlat(prev => ({ ...prev, [key]: parsedVal }));
      };

      // ==========================================
      // AUTHENTICATION HANDLERS
      // ==========================================
      const completeLogin = (user, lat, lng) => {
          const newSessionToken = Math.random().toString(36).substring(2) + Date.now().toString(36);
          
          const newLog = {
              id: Date.now().toString(),
              userId: user.id,
              userName: user.name,
              role: user.role,
              timestamp: Date.now(),
              lat,
              lng
          };

          const updatedUser = { ...user, sessionToken: newSessionToken };
          const updatedUsers = savedSalespersons.map(u => u.id === user.id ? updatedUser : u);
          const updatedLogs = [newLog, ...loginLogs];

          setSavedSalespersons(updatedUsers);
          setLoginLogs(updatedLogs);
          setCurrentUser(updatedUser);
          
          localStorage.setItem('vg_active_session_token', newSessionToken);
          localStorage.setItem('vg_login_timestamp', Date.now().toString());
          
          setLoginForm({ loginId: '', password: '' });
          setIsLoggingIn(false);
          
          if(updatedUser.permissions.tabs.lpPricelist) setActiveTab('lpPricelist');
          else if (updatedUser.permissions.tabs.simplePricelist) setActiveTab('simplePricelist');
          else setActiveTab('databases');

          _forceSaveToDB({ savedSalespersons: updatedUsers, loginLogs: updatedLogs });
      };

      const handleLogin = (e) => {
          e.preventDefault();
          const user = savedSalespersons.find(u => u.email.toLowerCase() === loginForm.loginId.toLowerCase() && u.password === loginForm.password);
          
          if (!user) {
              setIsLoggingIn(false);
              return alert("Invalid email or password.");
          }

          setIsLoggingIn(true);

          if (user.role === 'admin') {
              completeLogin(user, null, null);
              return;
          }

          if (!navigator.geolocation) {
              setIsLoggingIn(false);
              return alert("Geolocation is not supported by your browser. Location access is strictly required to login.");
          }

          navigator.geolocation.getCurrentPosition(
              (position) => {
                  completeLogin(user, position.coords.latitude, position.coords.longitude);
              },
              (error) => {
                  setIsLoggingIn(false);
                  alert("Location access is strictly required to log in. Please allow location access in your browser settings and try again.");
              },
              { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
          );
      };

      const handleLogout = () => {
          if (currentUser) {
              const updatedUser = { ...currentUser, sessionToken: null };
              const updatedUsers = savedSalespersons.map(u => u.id === currentUser.id ? updatedUser : u);
              setSavedSalespersons(updatedUsers);
              _forceSaveToDB({ savedSalespersons: updatedUsers });
          }
          setCurrentUser(null);
          setSalesperson('');
          setSalespersonPhone('');
          localStorage.removeItem('vg_active_session_token');
          localStorage.removeItem('vg_login_timestamp');
          setActiveTab('lpPricelist');
      };

      const handleForgotPassword = (e) => {
          e.preventDefault();
          const userIndex = savedSalespersons.findIndex(u => u.email.toLowerCase() === resetEmail.toLowerCase());
          if (userIndex !== -1) {
              const tempPassword = Math.random().toString(36).slice(-6);
              const updatedUsers = [...savedSalespersons];
              updatedUsers[userIndex] = { ...updatedUsers[userIndex], password: tempPassword, forcePasswordChange: true, sessionToken: null };
              
              setSavedSalespersons(updatedUsers);
              _forceSaveToDB({ savedSalespersons: updatedUsers });
              
              alert(`SYSTEM MESSAGE:\n\nA password reset request has been triggered for ID: ${resetEmail}.\nYour temporary password is: ${tempPassword}\n\nPlease log in to change it.`);
              setShowReset(false);
              setResetEmail('');
          } else {
              alert("Login ID not found in our database.");
          }
      };

      const handleForcePasswordChange = (e) => {
          e.preventDefault();
          if (newPasswordForm.newPassword !== newPasswordForm.confirmPassword) return alert("Passwords do not match.");
          if (newPasswordForm.newPassword.length < 4) return alert("Password must be at least 4 characters.");

          const updatedUser = { ...currentUser, password: newPasswordForm.newPassword, forcePasswordChange: false };
          const updatedUsers = savedSalespersons.map(u => u.id === updatedUser.id ? updatedUser : u);
          
          setSavedSalespersons(updatedUsers);
          setCurrentUser(updatedUser);
          _forceSaveToDB({ savedSalespersons: updatedUsers });
          setNewPasswordForm({ newPassword: '', confirmPassword: '' });
          alert("Password successfully changed!");
      };


      // ==========================================
      // MAIN ACTIONS (IMPORT, EXPORT, PRINT, SAVE)
      // ==========================================
      const handleSaveAll = async () => {
        if (!currentUser?.permissions?.actions?.canSave) return alert("Permission denied: You do not have save rights.");
        setIsSaving(true);
        try {
          await _forceSaveToDB();
          logActivity("System", `Manually saved changes to ${storageMode === 'cloud' ? 'Cloud' : 'Local Storage'}`);
          setTimeout(() => setIsSaving(false), 1500); 
        } catch (error) {
          alert("Error Saving Data.");
          console.error(error);
          setIsSaving(false);
        }
      };

      const handlePrint = () => {
        if (!currentUser?.permissions?.actions?.canPrint) return alert("Permission denied: You do not have print rights.");
        if (!salesperson || salesperson.trim() === '' || !salespersonPhone || salespersonPhone.trim() === '') {
          alert("Error: System missing salesperson details.");
          return;
        }
        logActivity("Document", `Printed ${activeTab} to PDF`);
        window.print();
      };

      const handleExport = () => {
        if (!currentUser?.permissions?.actions?.canImportExport) return alert("Permission denied: You do not have Export rights.");
        const dataToExport = { categories, products, masterColors, company, salesperson, salespersonPhone, savedCompanies, savedRoles, savedSalespersons, loginLogs, activityLogs, productCategories };
        const blob = new Blob([JSON.stringify(dataToExport)], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `VG_Pricelist_Backup_${new Date().toISOString().split('T')[0]}.vgbackup`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        logActivity("System", "Exported full system backup (.vgbackup)");
      };

      const handleImport = async (e) => {
        if (!currentUser?.permissions?.actions?.canImportExport) {
            e.target.value = '';
            return alert("Permission denied: You do not have Import rights.");
        }
        const fileInput = e.target;
        const file = fileInput.files[0];
        if (!file) return;
        
        const fileName = file.name;
        const reader = new FileReader();
        
        reader.onload = async (event) => {
          let importedData = null;
          try {
            const fileContent = event.target.result;
            if (fileContent.includes("<!DOCTYPE html>") || fileContent.includes("<html")) {
              alert("Error: It looks like you selected the HTML program file instead of the Backup Data file.");
              fileInput.value = ''; 
              return;
            }
            importedData = JSON.parse(fileContent);
          } catch (error) {
            alert("Error: The backup file is corrupted or invalid. Please select a valid .vgbackup or .json file.");
            fileInput.value = '';
            return;
          }
          
          if (importedData) {
            loadDataIntoState(importedData);
            try {
              await _forceSaveToDB(importedData); // Instantly sync imported data to Cloud/Local
              setImportedFileName(fileName);
              alert("Import successful! Data loaded and synced.");
              logActivity("System", `Imported system backup: ${fileName}`);
            } catch (storageError) {
              alert("Data displayed! However, we could not save it permanently.");
            }
          }
          fileInput.value = '';
        };
        reader.readAsText(file);
      };

      // ==========================================
      // EXCEL IMPORT / EXPORT / WIZARD LOGIC
      // ==========================================
      const exportToExcel = (dataArray, filename) => {
          if (!window.XLSX) return alert("Excel library not loaded. Please check your internet connection.");
          const worksheet = window.XLSX.utils.json_to_sheet(dataArray);
          const workbook = window.XLSX.utils.book_new();
          window.XLSX.utils.book_append_sheet(workbook, worksheet, "Sheet1");
          window.XLSX.writeFile(workbook, `${filename}.xlsx`);
      };

      const importFromExcel = (file, callback) => {
          if (!window.XLSX) return alert("Excel library not loaded.");
          const reader = new FileReader();
          reader.onload = (e) => {
              try {
                  const data = new Uint8Array(e.target.result);
                  const workbook = window.XLSX.read(data, {type: 'array'});
                  const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                  const json = window.XLSX.utils.sheet_to_json(worksheet);
                  callback(json);
              } catch(err) {
                  alert("Error reading Excel file. Ensure it is properly formatted.");
              }
          };
          reader.readAsArrayBuffer(file);
      };

      const handleExcelExport = (type) => {
          if (!currentUser?.permissions?.actions?.canImportExport) return alert("Permission denied: You do not have Export rights.");
          
          if (type === 'products') {
              const flatData = products.map(p => {
                  const baseRow = {
                      ID: p.id,
                      Name: p.name,
                      ProductCategory: productCategories.find(c=>c.id===p.productCategoryId)?.name || '',
                      DiscountCategory: categories.find(c=>c.id===p.categoryId)?.name || '',
                      PackQty: p.packQty,
                      Unit: p.unit,
                      ImageURL: p.image
                  };
                  
                  const priceColumns = masterColors.reduce((acc, c) => {
                      const pData = p.prices[c.id];
                      acc[`${c.name}_Available`] = (pData && pData.available === false) ? 'No' : 'Yes';
                      acc[`${c.name}_DealerBox`] = pData?.dealerBox || 0;
                      acc[`${c.name}_DealerUnbox`] = pData?.dealerUnbox || 0;
                      acc[`${c.name}_SellingPrice`] = pData?.sellingPrice || 0;
                      acc[`${c.name}_ListPrice`] = pData?.retail || 0;
                      return acc;
                  }, {});

                  return { ...baseRow, ...priceColumns };
              });
              exportToExcel(flatData, 'VG_Products');
              logActivity("Export Data", "Exported Products to Excel");
          } else if (type === 'users') {
              const flatData = savedSalespersons.map(u => ({
                  ID: u.id,
                  FullName: u.name,
                  Phone: u.phone,
                  LoginID: u.email,
                  RoleID: u.role,
                  RoleName: savedRoles.find(r => r.id === u.role)?.name || u.role
              }));
              exportToExcel(flatData, 'VG_Users');
              logActivity("Export Data", "Exported Users to Excel");
          } else if (type === 'categories') {
              const flatData = productCategories.map(c => ({ ID: c.id, Name: c.name }));
              exportToExcel(flatData, 'VG_Product_Categories');
              logActivity("Export Data", "Exported Product Categories to Excel");
          }
      };

      const finalizeExcelImport = (type, newItems, resolvedItems, extraUpdates) => {
          if (type === 'products') {
              const merged = [...products.filter(p => !resolvedItems.find(r => r.id === p.id)), ...resolvedItems, ...newItems];
              setProducts(merged);
          } else if (type === 'users') {
              const merged = [...savedSalespersons.filter(u => !resolvedItems.find(r => r.id === u.id)), ...resolvedItems, ...newItems];
              setSavedSalespersons(merged);
          } else if (type === 'categories') {
              const merged = [...productCategories.filter(c => !resolvedItems.find(r => r.id === c.id)), ...resolvedItems, ...newItems];
              setProductCategories(merged);
          }
          
          if (extraUpdates) {
              if (extraUpdates.categories) setProductCategories(extraUpdates.categories);
          }
          
          const totalImported = newItems.length + resolvedItems.length;
          logActivity("Import Data", `Imported/Merged ${totalImported} ${type} via Excel`);
          alert(`Success! Handled ${totalImported} items (Merged: ${resolvedItems.length}, Added: ${newItems.length}). Click "Save!" to sync to cloud.`);
      };

      const handleExcelImport = (e, type) => {
          if (!currentUser?.permissions?.actions?.canImportExport) {
              e.target.value = null;
              return alert("Permission denied: You do not have Import rights.");
          }
          const file = e.target.files[0];
          if (!file) return;

          importFromExcel(file, (json) => {
              let queue = [];
              let newItems = [];
              let autoResolved = [];
              let extraUpdates = {};

              const checkDiff = (imp, ex) => {
                  const flatImp = flattenObj(imp);
                  const flatEx = flattenObj(ex);
                  for (let key in flatImp) {
                      if (key === 'id' || key.includes('permissions')) continue;
                      
                      const valImp = flatImp[key] !== undefined && flatImp[key] !== null ? String(flatImp[key]).trim() : '';
                      const valEx = flatEx[key] !== undefined && flatEx[key] !== null ? String(flatEx[key]).trim() : '';
                      
                      if (!isNaN(valImp) && !isNaN(valEx) && valImp !== '' && valEx !== '') {
                           if (Number(valImp) !== Number(valEx)) return true;
                      } else if (valImp !== valEx) {
                           // Ignore missing images from excel causing false conflict
                           if (key === 'image' && valImp.includes('placehold.co') && valEx !== '') continue;
                           return true;
                      }
                  }
                  return false;
              };

              if (type === 'products') {
                  json.forEach(row => {
                      if(!row.Name && !row.ID) return;
                      const pc = productCategories.find(c => c.name === row.ProductCategory)?.id || productCategories[0]?.id || '';
                      const dc = categories.find(c => c.name === row.DiscountCategory)?.id || categories[0]?.id || '';
                      
                      const parsedPrices = masterColors.reduce((acc, c) => {
                          acc[c.id] = {
                              available: row[`${c.name}_Available`] === 'No' ? false : true,
                              dealerBox: parseFloat(row[`${c.name}_DealerBox`]) || 0,
                              dealerUnbox: parseFloat(row[`${c.name}_DealerUnbox`]) || 0,
                              sellingPrice: parseFloat(row[`${c.name}_SellingPrice`]) || 0,
                              retail: parseFloat(row[`${c.name}_ListPrice`]) || 0,
                          };
                          return acc;
                      }, {});

                      const importedObj = {
                          id: row.ID || 'prod_' + Date.now() + Math.random().toString(36).substr(2, 9),
                          name: row.Name || 'Unnamed',
                          productCategoryId: pc,
                          categoryId: dc,
                          packQty: row.PackQty?.toString() || '1',
                          unit: row.Unit || 'pcs',
                          image: row.ImageURL || 'https://placehold.co/200x200/f8fafc/94a3b8?text=Image',
                          prices: parsedPrices
                      };
                      
                      const existing = products.find(p => p.id == row.ID || (row.Name && p.name.toLowerCase() === row.Name.toLowerCase()));
                      if (existing) {
                          if (checkDiff(importedObj, existing)) {
                              queue.push({ imported: importedObj, existing, draft: JSON.parse(JSON.stringify({...importedObj, id: existing.id})) });
                          } else {
                              autoResolved.push(existing);
                          }
                      } else {
                          newItems.push(importedObj);
                      }
                  });
              } 
              else if (type === 'users') {
                  json.forEach(row => {
                      if (!row.LoginID && !row.ID) return;
                      
                      const matchedRole = savedRoles.find(r => r.id === row.RoleID || r.name === row.RoleName) || savedRoles.find(r => r.id === 'salesperson');
                      
                      const importedObj = {
                          id: row.ID || 'usr_' + Date.now() + Math.random().toString(36).substr(2, 5),
                          name: row.FullName || 'Imported User',
                          phone: row.Phone || '-',
                          email: row.LoginID || 'unknown@import.com',
                          password: 'password123',
                          role: matchedRole.id,
                          permissions: JSON.parse(JSON.stringify(matchedRole.permissions)),
                          forcePasswordChange: true,
                          sessionToken: null
                      };
                      const existing = savedSalespersons.find(u => u.id == row.ID || (row.LoginID && u.email === row.LoginID));
                      if (existing) {
                          if (checkDiff(importedObj, existing)) {
                              queue.push({ imported: importedObj, existing, draft: JSON.parse(JSON.stringify({...importedObj, id: existing.id, password: existing.password})) }); 
                          } else {
                              autoResolved.push(existing);
                          }
                      } else {
                          newItems.push(importedObj);
                      }
                  });
              } 
              else if (type === 'categories') {
                  json.forEach(row => {
                      if (!row.Name && !row.ID) return;
                      const importedObj = { id: row.ID || 'pc' + Date.now() + Math.random().toString(36).substr(2,4), name: row.Name || 'Unnamed' };
                      const existing = productCategories.find(c => c.id == row.ID || (row.Name && c.name === row.Name));
                      if (existing) {
                          if (checkDiff(importedObj, existing)) {
                              queue.push({ imported: importedObj, existing, draft: JSON.parse(JSON.stringify({...importedObj, id: existing.id})) });
                          } else {
                              autoResolved.push(existing);
                          }
                      } else {
                          newItems.push(importedObj);
                      }
                  });
              }

              if (queue.length > 0) {
                  setMergeWizard({ isOpen: true, type, queue, currentIndex: 0, newItems, resolvedItems: autoResolved, extraUpdates });
              } else {
                  finalizeExcelImport(type, newItems, autoResolved, extraUpdates);
              }
          });
          e.target.value = null; // reset
      };

      const handleWizardAction = (action) => {
          const current = mergeWizard.queue[mergeWizard.currentIndex];
          let resolvedItem = null;
          
          if (action === 'use_existing') {
              resolvedItem = current.existing;
          } else if (action === 'use_imported') {
              resolvedItem = { ...current.imported, id: current.existing.id };
          } else if (action === 'use_draft') {
              resolvedItem = unflattenObj(wizardDraftFlat);
              resolvedItem.id = current.existing.id; // Enforce existing ID for relational integrity
          }
          
          const newResolvedItems = [...mergeWizard.resolvedItems, resolvedItem];
          
          if (mergeWizard.currentIndex < mergeWizard.queue.length - 1) {
              setMergeWizard({ ...mergeWizard, currentIndex: mergeWizard.currentIndex + 1, resolvedItems: newResolvedItems });
          } else {
              finalizeExcelImport(mergeWizard.type, mergeWizard.newItems, newResolvedItems, mergeWizard.extraUpdates);
              setMergeWizard({ isOpen: false, type: '', queue: [], currentIndex: 0, newItems: [], resolvedItems: [], extraUpdates: {} });
          }
      };

      const handleLogExport = (e) => {
          e.preventDefault();
          let logsToExport = exportLogType === 'login' ? loginLogs : activityLogs;
          
          const startTimestamp = new Date(exportStartDate).getTime();
          const endTimestamp = new Date(exportEndDate).setHours(23, 59, 59, 999);

          logsToExport = logsToExport.filter(log => log.timestamp >= startTimestamp && log.timestamp <= endTimestamp);

          if(logsToExport.length === 0) return alert("No logs found in this date range.");

          const flatLogs = logsToExport.map(l => ({
              Date: new Date(l.timestamp).toLocaleString(),
              User: l.userName || l.userId,
              Action: l.action || (exportLogType === 'login' ? 'Login' : ''),
              Details: l.details || (l.lat ? `Lat: ${l.lat}, Lng: ${l.lng}` : 'Admin Bypass')
          }));
          
          exportToExcel(flatLogs, `VG_${exportLogType}_Logs_${exportStartDate}_to_${exportEndDate}`);
          logActivity('Export Data', `Exported ${logsToExport.length} ${exportLogType} logs to Excel`);
      }

      // ==========================================
      // DATABASE & FORM HANDLERS
      // ==========================================
      const handleSaveCompDB = (e) => {
        e.preventDefault();
        if (!currentUser.permissions.company.add && !isEditingComp) return alert("Permission denied.");
        if (!currentUser.permissions.company.edit && isEditingComp) return alert("Permission denied.");
        
        let actMsg = '';
        if(isEditingComp) {
            setSavedCompanies(savedCompanies.map(c => c.id === compForm.id ? compForm : c));
            if(company.id === compForm.id) setCompany(compForm);
            actMsg = `Edited Company: ${compForm.name}`;
        } else {
            setSavedCompanies([...savedCompanies, { ...compForm, id: Date.now().toString() }]);
            actMsg = `Added Company: ${compForm.name}`;
        }
        logActivity("Database", actMsg);
        setCompForm({ id: '', name: '', address: '', contact: '', logo: '' });
        setIsEditingComp(false);
      };
      
      const handleEditComp = (c) => { setCompForm(c); setIsEditingComp(true); };
      const handleDeleteComp = (id) => {
        if (!currentUser.permissions.company.remove) return alert("Permission denied.");
        const compToDelete = savedCompanies.find(c => c.id === id);
        if(window.confirm("Are you sure you want to delete this company profile?")) {
            setSavedCompanies(savedCompanies.filter(c => c.id !== id));
            if(company.id === id) setCompany({ id: '', name: '', address: '', contact: '', logo: '' });

      const handleSavePcDB = (e) => {

        setPcForm({ id: '', name: '' });
        setIsEditingPc(false);

      const handleEditPc = (c) => { setPcForm(c); setIsEditingPc(true); };

        let actMsg = '';

            actMsg = `Added Product Color: ${colorForm.name}`;

        logActivity("Database", actMsg);
        setColorForm({ id: '', name: '' });
        setIsEditingColor(false);

      const handleEditColor = (c) => { setColorForm(c); setIsEditingColor(true); };

      const handleRoleChangeForSpForm = (e) => {

      const handleRolePermissionToggle = (category, action) => {
          setRoleForm({
             ...roleForm,
             permissions: {
                ...roleForm.permissions,
                [category]: { ...roleForm.permissions[category], [action]: !roleForm.permissions[category][action] }
             }
          });
      };

      const handleRoleActionPermissionToggle = (category, action) => {
           setRoleForm({
             ...roleForm,
             permissions: {
                ...roleForm.permissions,
                [category]: { ...roleForm.permissions[category], [action]: !roleForm.permissions[category][action] }
             }
          });
      };

      const handleSaveRoleDB = (e) => {
          e.preventDefault();
          if (!currentUser.permissions.users.add && !isEditingRole) return alert("Permission denied.");
          if (!currentUser.permissions.users.edit && isEditingRole) return alert("Permission denied.");
          if (roleForm.id === 'admin' && currentUser.role !== 'admin') return alert("Only Admin can edit the Admin role.");

          let updatedRoles;
          if (isEditingRole) {
              updatedRoles = savedRoles.map(r => r.id === roleForm.id ? roleForm : r);
              
              // Sync to all users with this role
              const updatedUsers = savedSalespersons.map(u => {
                  if (u.role === roleForm.id) {
                      return { ...u, permissions: JSON.parse(JSON.stringify(roleForm.permissions)) };
                  }
                  return u;
              });
              setSavedSalespersons(updatedUsers);
              
              if (currentUser.role === roleForm.id) {
                  setCurrentUser({...currentUser, permissions: JSON.parse(JSON.stringify(roleForm.permissions))});
              }
          } else {
              updatedRoles = [...savedRoles, { ...roleForm, id: 'role_' + Date.now(), isSystem: false }];
          }
          setSavedRoles(updatedRoles);
          setRoleForm({ id: '', name: '', isSystem: false, permissions: JSON.parse(JSON.stringify(basePermissionsTemplate)) });
          setIsEditingRole(false);
          logActivity("Database", isEditingRole ? `Edited Role: ${roleForm.name}` : `Added Role: ${roleForm.name}`);
      };

      const handleEditRole = (r) => { 
          if (r.id === 'admin' && currentUser.role !== 'admin') return alert("Only Admin can edit the Admin role.");
          setRoleForm(r); 
          setIsEditingRole(true); 
      };

      const handleDeleteRole = (id) => {
          if (!currentUser.permissions.users.remove) return alert("Permission denied.");
          if (id === 'admin') return alert("Cannot delete the system Admin role.");
          
          const isUsed = savedSalespersons.some(u => u.role === id);
          if (isUsed) return alert("Cannot delete this role because it is currently assigned to one or more users. Please change their roles first.");

          if (window.confirm("Are you sure you want to delete this Access Role?")) {
              setSavedRoles(savedRoles.filter(r => r.id !== id));
              logActivity("Database", `Deleted Role: ${savedRoles.find(r => r.id === id)?.name}`);
          }
      };

      const handleSaveSpDB = (e) => {
        e.preventDefault();
        if (!currentUser.permissions.users.add && !isEditingSp) return alert("Permission denied.");
        if (!currentUser.permissions.users.edit && isEditingSp) return alert("Permission denied.");
        
        const selectedRoleDef = savedRoles.find(r => r.id === spForm.role) || savedRoles.find(r => r.id === 'salesperson');
        const userToSave = { ...spForm, permissions: JSON.parse(JSON.stringify(selectedRoleDef.permissions)) };

        let actMsg = '';
        if(isEditingSp) {
            setSavedSalespersons(savedSalespersons.map(s => s.id === spForm.id ? userToSave : s));
            if(salesperson === savedSalespersons.find(s => s.id === spForm.id)?.name) {
                setSalesperson(spForm.name);
                setSalespersonPhone(spForm.phone);
            }
            if (currentUser.id === spForm.id) setCurrentUser({...userToSave});
            actMsg = `Edited User: ${spForm.name}`;
        } else {
            setSavedSalespersons([...savedSalespersons, { ...userToSave, id: Date.now().toString(), forcePasswordChange: false, sessionToken: null }]);
            actMsg = `Added User: ${spForm.name}`;
        }
        logActivity("Database", actMsg);
        setSpForm({ id: '', name: '', phone: '', email: '', password: '', role: 'salesperson', permissions: {} });
        setIsEditingSp(false);

      const handleEditSp = (s) => { setSpForm(s); setIsEditingSp(true); };

      const handleDeleteSp = (id) => {
        if (!currentUser.permissions.users.remove) return alert("Permission denied.");
        if (currentUser.id === id) return alert("You cannot delete your own active account.");
        const usrToDelete = savedSalespersons.find(s => s.id === id);
        if(window.confirm("Are you sure you want to delete this user profile?")) {
            setSavedSalespersons(savedSalespersons.filter(s => s.id !== id));
            logActivity("Database", `Deleted User: ${usrToDelete?.name}`);
        }
      };


      // ==========================================
      // PRICELIST & PRODUCT HANDLERS
      // ==========================================
      const updateCategory = (id, field, value) => {
          if (!currentUser.permissions.discounts.edit) return;
          setCategories(categories.map(c => c.id === id ? { ...c, [field]: field === 'discount' ? parseFloat(value) || 0 : value } : c));
      };
      const addCategory = () => {
          if (!currentUser.permissions.discounts.add) return;
          setCategories([...categories, { id: Date.now().toString(), name: 'New Discount', discount: 0 }]);
          logActivity("Data", "Added new Base Discount category");
      };
      const removeCategory = (id) => {
          if (!currentUser.permissions.discounts.remove) return;
          setCategories(categories.filter(c => c.id !== id));
          setProducts(products.map(p => p.categoryId === id ? { ...p, categoryId: '' } : p));
          logActivity("Data", "Removed Base Discount category");
      };
      
      const updateProductCategory = (productId, categoryId) => {
          if (!currentUser.permissions.products.edit) return;
          setProducts(products.map(p => p.id === productId ? { ...p, categoryId } : p));
      };

      const executeDeleteProduct = () => {
        if (!currentUser.permissions.products.remove) return;
        if (productToDelete) { 
            const pName = products.find(p => p.id === productToDelete)?.name;
            setProducts(products.filter(p => p.id !== productToDelete)); 
            setProductToDelete(null); 
            logActivity("Data", `Deleted Product: ${pName}`);
        }
      };

      const moveProductUp = (absoluteIndex) => {
        if (!currentUser.permissions.products.edit) return;
        if (absoluteIndex <= 0) return;
        const newProducts = [...products];
        const temp = newProducts[absoluteIndex];
        newProducts[absoluteIndex] = newProducts[absoluteIndex - 1];
        newProducts[absoluteIndex - 1] = temp;
        setProducts(newProducts);
      };

      const moveProductDown = (absoluteIndex) => {
        if (!currentUser.permissions.products.edit) return;
        if (absoluteIndex >= products.length - 1) return;
        const newProducts = [...products];
        const temp = newProducts[absoluteIndex];
        newProducts[absoluteIndex] = newProducts[absoluteIndex + 1];
        newProducts[absoluteIndex + 1] = temp;
        setProducts(newProducts);
      };

      const handleImageUpload = (e) => {
        if (!currentUser.permissions.products.add && !currentUser.permissions.products.edit) return;
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => setNewProduct({ ...newProduct, image: reader.result });
          reader.readAsDataURL(file);
        }
      };

      const handleOpenAddModal = () => {
          const initialPrices = {};
          masterColors.forEach(c => {
              initialPrices[c.id] = { available: true, dealerBox: '', dealerUnbox: '', sellingPrice: '', retail: '' };
          });
          setNewProduct({
              name: '', categoryId: categories[0]?.id || '', productCategoryId: productCategories[0]?.id || '', image: '', packQty: '', unit: '',
              prices: initialPrices
          });
          setIsModalOpen(true);
      };

      const handleAddProductSubmit = (e) => {
        e.preventDefault();
        if (!currentUser.permissions.products.add) return;
        
        const parsedPrices = {};
        for(const [cId, pData] of Object.entries(newProduct.prices)) {
             parsedPrices[cId] = {
                 available: pData.available,
                 dealerBox: parseFloat(pData.dealerBox) || 0,
                 dealerUnbox: parseFloat(pData.dealerUnbox) || 0,
                 sellingPrice: parseFloat(pData.sellingPrice) || 0,
                 retail: parseFloat(pData.retail) || 0
             };
        }

        const productToAdd = {
          id: Date.now(),
          name: newProduct.name || 'Unnamed Product',
          categoryId: newProduct.categoryId || categories[0]?.id,
          productCategoryId: newProduct.productCategoryId || productCategories[0]?.id || '',
          image: newProduct.image || `https://placehold.co/200x200/f8fafc/94a3b8?text=Image`,
          packQty: newProduct.packQty || '-',
          unit: newProduct.unit || '-',
          prices: parsedPrices
        };
        
        setProducts([...products, productToAdd]);
        setIsModalOpen(false);
        logActivity("Data", `Added Product: ${productToAdd.name}`);
      };

      const toggleProductCategory = (id) => {
         if (id === 'all') {
             setSelectedProductCategories(['all']);
         } else {
             let newSel = selectedProductCategories.filter(catId => catId !== 'all');
             if (newSel.includes(id)) {
                 newSel = newSel.filter(catId => catId !== id);
                 if (newSel.length === 0) newSel = ['all'];
             } else {
                 newSel.push(id);
             }
             setSelectedProductCategories(newSel);
         }
      };

      const filteredProducts = useMemo(() => {
          return products.filter(p => 
              selectedProductCategories.includes('all') || 
              selectedProductCategories.includes(p.productCategoryId)
          );
      }, [products, selectedProductCategories]);

      const visibleColors = useMemo(() => {
          if (filteredProducts.length === 0) return masterColors;
          
          return masterColors.filter(color => {
              // Show column if at least one filtered product has this color marked as available
              return filteredProducts.some(p => {
                  const pData = p.prices[color.id];
                  // Legacy data doesn't have `available` flag, so treat undefined as true
                  return pData && pData.available !== false; 
              });
          });
      }, [masterColors, filteredProducts]);

      // ==========================================
      // REUSABLE COMPONENTS
      // ==========================================
      const PrintHeader = ({ title, subtitle }) => {
        return (
          <div className="hidden print:block mb-6 w-full relative">
            <div className="absolute top-0 left-0 w-full h-[3px] bg-slate-900"></div>
            <div className="flex justify-between items-start pt-6 pb-6 border-b border-gray-300 mb-6">
              <div className="flex items-center gap-6">
                {company.logo && <img src={company.logo} alt="Logo" className="w-24 h-24 object-contain" />}
                <div className="flex-1 mt-1">
                  <h1 className="text-2xl font-extrabold text-slate-900 tracking-tight leading-tight">{company.name}</h1>
                  <p className="text-[11px] text-gray-600 mt-2 whitespace-pre-wrap leading-relaxed">{company.address}</p>
                  <p className="text-[11px] text-gray-600 mt-0.5">{company.contact}</p>
                </div>
              </div>
              <div className="text-right mt-1 flex flex-col justify-start">
                <h2 className="text-2xl font-black text-slate-900 uppercase tracking-widest">{title}</h2>
                {subtitle && <p className="text-sm font-bold text-gray-500 tracking-widest mt-1">{subtitle}</p>}
                <p className="text-xs font-semibold text-gray-800 mt-4">Date: <span className="font-normal">{new Date().toLocaleString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</span></p>
              </div>
            </div>
          </div>
        );
      };

      const PrintFooterSignature = () => (
        <div className="hidden print:block mt-12 pt-6 page-break-inside-avoid relative">
          <div className="absolute top-0 left-12 right-12 border-t border-gray-300"></div>
          <div className="flex justify-between text-center px-16 items-start">
            <div className="w-64 flex flex-col items-center">
              <div className="h-20 w-full"></div>
              <div className="border-b border-gray-400 w-56 mb-2"></div>
              <p className="text-sm font-extrabold text-slate-900">{salesperson}</p>
              <p className="text-[10px] text-gray-600 mt-0.5">เบอร์ติดต่อ: {salespersonPhone}</p>
              <p className="text-[10px] text-slate-500 mt-1.5 uppercase tracking-wider font-semibold">Salesperson</p>
            </div>
            <div className="w-64 flex flex-col items-center">
              <div className="h-20 w-full"></div>
              <div className="border-b border-gray-400 w-56 mb-2"></div>
              <p className="text-[10px] text-slate-500 mt-1.5 uppercase tracking-wider font-semibold">Authorized Signature</p>
            </div>
          </div>
        </div>
      );


      // ==========================================
      // EARLY RETURNS FOR AUTHENTICATION
      // ==========================================
      if (isInitializing) {
          return <div className="min-h-screen bg-gray-100 flex items-center justify-center"><i className="fas fa-spinner fa-spin text-4xl text-blue-600"></i></div>;
      }

      if (currentUser && currentUser.forcePasswordChange) {
          return (
            <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
               <div className="bg-white rounded-xl shadow-2xl max-w-md w-full p-8 animate-in fade-in zoom-in-95">
                  <div className="text-center mb-6">
                      <div className="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i className="fas fa-key text-yellow-600 text-2xl"></i>
                      </div>
                      <h2 className="text-2xl font-black text-slate-900 tracking-tight">Security Update</h2>
                      <p className="text-sm text-gray-500 mt-2">You are using a temporary password. Please create a new password to continue.</p>
                  </div>
                  <form onSubmit={handleForcePasswordChange} className="space-y-4">
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1">New Password</label>
                        <input type="password" required minLength="4" value={newPasswordForm.newPassword} onChange={e=>setNewPasswordForm({...newPasswordForm, newPassword: e.target.value})} className="w-full p-2.5 border rounded outline-none focus:border-blue-500 bg-gray-50" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1">Confirm Password</label>
                        <input type="password" required minLength="4" value={newPasswordForm.confirmPassword} onChange={e=>setNewPasswordForm({...newPasswordForm, confirmPassword: e.target.value})} className="w-full p-2.5 border rounded outline-none focus:border-blue-500 bg-gray-50" />
                      </div>
                      <button type="submit" className="w-full py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-colors shadow mt-4">Save & Continue</button>
                  </form>
               </div>
            </div>
          );
      }

      if (!currentUser) {
          return (
            <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 relative overflow-hidden">
               <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-blue-900/40 blur-3xl"></div>
               <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-blue-800/20 blur-3xl"></div>

               <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 relative z-10 animate-in fade-in slide-in-from-bottom-4 duration-500">
                  
                  {!showReset ? (
                      <>
                        <div className="text-center mb-8">
                            <i className="fas fa-shield-alt text-blue-600 text-4xl mb-3"></i>
                            <h2 className="text-2xl font-black text-slate-900 tracking-tight">Secure Login</h2>
                            <p className="text-sm text-gray-500 mt-1">Location access is required to connect.</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-5">
                            <div>
                              <label className="block text-xs font-bold text-gray-700 mb-1">Login ID</label>
                              <div className="relative">
                                  <i className="fas fa-user absolute left-3 top-3 text-gray-400"></i>
                                  <input type="text" required value={loginForm.loginId} onChange={e=>setLoginForm({...loginForm, loginId: e.target.value})} className="w-full pl-9 pr-3 py-2.5 border rounded outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-50 transition-all" placeholder="admin / name@company.com" disabled={isLoggingIn} />
                              </div>
                            </div>
                            <div>
                              <div className="flex justify-between mb-1">
                                <label className="block text-xs font-bold text-gray-700">Password</label>
                                <button type="button" onClick={() => setShowReset(true)} className="text-[11px] font-bold text-blue-600 hover:underline" disabled={isLoggingIn}>Forgot password?</button>
                              </div>
                              <div className="relative">
                                  <i className="fas fa-lock absolute left-3 top-3 text-gray-400"></i>
                                  <input type="password" required value={loginForm.password} onChange={e=>setLoginForm({...loginForm, password: e.target.value})} className="w-full pl-9 pr-3 py-2.5 border rounded outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-50 transition-all" placeholder="••••••••" disabled={isLoggingIn} />
                              </div>
                            </div>
                            <button type="submit" disabled={isLoggingIn} className="w-full py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 disabled:bg-blue-400 disabled:cursor-not-allowed transition-transform active:scale-95 shadow mt-2 flex justify-center items-center gap-2">
                                {isLoggingIn ? <><i className="fas fa-spinner fa-spin"></i> Locating...</> : 'Sign In'}
                            </button>
                        </form>
                      </>
                  ) : (

                              </div>
                            </div>
                            <div className="flex flex-col gap-2 pt-2">
                                <button type="submit" className="w-full py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-transform active:scale-95 shadow">Send Reset Link</button>
                                <button type="button" onClick={() => setShowReset(false)} className="w-full py-3 bg-gray-100 text-gray-700 rounded-lg font-bold hover:bg-gray-200 transition-colors">Back to Login</button>
                            </div>
                        </form>
                      </>
                  )}
               </div>
            </div>
          );
      }

      // --- HELPER RENDERING FUNCTIONS ---
      const renderRoleCrudCheckboxes = (label, categoryKey) => (
          <div className="flex flex-col gap-1.5 border-b border-gray-200 pb-2 mb-2">
             <span className="text-[11px] font-bold text-gray-800">{label}</span>
             <div className="flex gap-4">
                 {['view', 'add', 'edit', 'remove'].map(action => {
                    const isDisabled = currentUser.role !== 'admin' && !currentUser.permissions[categoryKey]?.[action];
                    return (
                    <label key={action} className={`flex items-center gap-1.5 text-[10px] font-medium ${isDisabled ? 'text-gray-400 cursor-not-allowed' : 'text-gray-600 cursor-pointer hover:text-blue-600'}`}>
                        <input type="checkbox" checked={roleForm.permissions[categoryKey][action]} 
                           onChange={() => !isDisabled && handleRolePermissionToggle(categoryKey, action)}
                           disabled={isDisabled}
                           className={`rounded w-3 h-3 ${isDisabled ? 'bg-gray-200 border-gray-300' : 'text-blue-600 focus:ring-blue-500 cursor-pointer'}`} />
                        <span className="capitalize">{action}</span>
                    </label>
                 )})}
             </div>
          </div>
      );

      const renderRoleSystemCheckbox = (label, category, key, isAction = false) => {
          const hasPerm = currentUser.permissions[category]?.[key];
          const isDisabled = currentUser.role !== 'admin' && !hasPerm;
          const toggleFn = isAction ? handleRoleActionPermissionToggle : handleRolePermissionToggle;
          return (
             <label className={`flex items-center gap-2 text-[10px] font-medium ${isDisabled ? 'text-gray-400 cursor-not-allowed' : 'text-gray-700 cursor-pointer'}`}>
                 <input type="checkbox" checked={roleForm.permissions[category][key]} onChange={() => !isDisabled && toggleFn(category, key)} disabled={isDisabled} className={`rounded w-3 h-3 ${isDisabled ? 'bg-gray-200 border-gray-300' : 'text-blue-600 focus:ring-blue-500 cursor-pointer'}`} /> {label}
             </label>
          );
      };

      const renderProductCategoryFilter = () => (
        <div className="print:hidden mb-4 bg-gray-50 border border-gray-200 p-3 rounded-lg flex flex-col sm:flex-row items-start sm:items-center gap-3">
          <div className="relative">
             <button 
               onClick={() => setIsFilterDropdownOpen(!isFilterDropdownOpen)}
               className="flex items-center gap-2 bg-white border border-gray-300 text-gray-700 text-xs font-bold py-1.5 px-4 rounded-full hover:bg-gray-100 shadow-sm transition-colors"
             >
               <i className="fas fa-filter text-blue-500"></i> Filter Categories <i className="fas fa-chevron-down text-[10px] ml-1"></i>
             </button>

                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                    {masterColors.map((color) => {
                      const pData = newProduct.prices[color.id] || { available: true, dealerBox: '', dealerUnbox: '', sellingPrice: '', retail: '' };
                      
                      return (
                      <div key={color.id} className={`bg-white p-4 rounded-lg shadow-sm border border-gray-200 transition-opacity ${pData.available ? 'opacity-100' : 'opacity-60 bg-gray-50'}`}>
                        <div className="flex flex-col items-center border-b border-gray-100 pb-2 mb-3 bg-blue-50 py-1.5 rounded">
                            <h4 className="font-bold text-blue-900 text-sm text-center truncate w-full px-2" title={color.name}>{color.name}</h4>
                            <label className="flex items-center gap-1.5 text-[10px] font-bold text-gray-600 mt-1 cursor-pointer">
                                <input 
                                  type="checkbox" 
                                  checked={pData.available} 
                                  onChange={(e) => {
                                      setNewProduct(prev => ({
                                          ...prev,
                                          prices: { ...prev.prices, [color.id]: { ...pData, available: e.target.checked } }
                                      }))
                                  }}
                                  className="w-3 h-3 rounded text-blue-600 focus:ring-blue-500 cursor-pointer"
                                /> 
                                {pData.available ? <span className="text-emerald-600">Available</span> : <span className="text-red-500">Not Available</span>}
                            </label>
                        </div>
                        
                        {pData.available ? (
                            <div className="space-y-2">
                              <div>
                                <label className="block text-[10px] font-bold text-blue-700 uppercase">Dealer (ครบลัง)</label>
                                <input type="number" value={pData.dealerBox} onChange={e => setNewProduct(prev => ({...prev, prices: {...prev.prices, [color.id]: {...pData, dealerBox: e.target.value}}}))} className="w-full p-1 text-sm border rounded focus:ring-1 focus:ring-blue-500 outline-none mt-1" />
                              </div>
                              <div>
                                <label className="block text-[10px] font-bold text-blue-500 uppercase">Dealer (ไม่ครบลัง)</label>
                                <input type="number" value={pData.dealerUnbox} onChange={e => setNewProduct(prev => ({...prev, prices: {...prev.prices, [color.id]: {...pData, dealerUnbox: e.target.value}}}))} className="w-full p-1 text-sm border rounded focus:ring-1 focus:ring-blue-500 outline-none mt-1" />
                              </div>
                              <div className="border-t border-gray-100 pt-1 mt-1">
                                <label className="block text-[10px] font-bold text-emerald-600 uppercase">Selling Price (แนะนำขาย)</label>
                                <input type="number" value={pData.sellingPrice} onChange={e => setNewProduct(prev => ({...prev, prices: {...prev.prices, [color.id]: {...pData, sellingPrice: e.target.value}}}))} className="w-full p-1 text-sm border rounded focus:ring-1 focus:ring-emerald-500 outline-none mt-1" />
                              </div>
                              <div className="border-t border-gray-100 pt-1 mt-1">
                                <label className="block text-[10px] font-bold text-gray-500 uppercase">List Price (ราคาตั้ง)</label>
                                <input type="number" value={pData.retail} onChange={e => setNewProduct(prev => ({...prev, prices: {...prev.prices, [color.id]: {...pData, retail: e.target.value}}}))} className="w-full p-1 text-sm border rounded focus:ring-1 focus:ring-blue-500 outline-none mt-1" />
                              </div>
                            </div>
                        ) : (
                            <div className="flex items-center justify-center h-48 border-2 border-dashed border-gray-200 rounded bg-gray-50/50">
                                <span className="text-gray-400 font-bold text-sm tracking-widest uppercase"><i className="fas fa-ban mr-1.5"></i> N/A</span>
                            </div>
                        )}
                      </div>
                    )})}
                  </div>

                  <div className="flex justify-end gap-3 pt-4">
                    <button type="button" onClick={() => setIsModalOpen(false)} className="px-5 py-2 text-sm text-gray-600 hover:bg-gray-200 rounded-lg font-bold transition-colors">Cancel</button>
                    <button type="submit" className="px-6 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-md transition-transform active:scale-95">Save Product</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* --- CONFIRM DELETE MODAL --- */}
          {productToDelete && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 print:hidden">
              <div className="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 text-center animate-in zoom-in-95 duration-200">
                <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <i className="fas fa-exclamation-triangle text-red-500 text-[32px]"></i>
                </div>
                <h3 className="text-lg font-bold text-gray-900 mb-2">Delete Product?</h3>
                <p className="text-sm text-gray-600 mb-6 px-2">
                  Are you sure you want to remove <strong>"{products.find(p => p.id === productToDelete)?.name}"</strong>? This action cannot be undone unless you have unsaved data to reload.
                </p>
                <div className="flex justify-center gap-3">
                  <button onClick={() => setProductToDelete(null)} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg font-bold hover:bg-gray-200 transition-colors">Cancel</button>
                  <button onClick={executeDeleteProduct} className="flex-1 py-2.5 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 transition-colors shadow-sm">Yes, Delete</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
