<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricelist Manager AI (Local Edition)</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel to compile JSX inside the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- localForage for local fallback storage -->

  <!-- SheetJS for Excel Import/Export -->

  <!-- CryptoJS for AES Encryption of Backups -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

  <!-- Preconnect to CDNs to speed up downloads -->
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">

  <style>
    /* Printing Overrides - Luxury & Formal Edition */
    @media print {
      @page { margin: 12mm 8mm; size: auto; }
      html { font-size: 72% !important; }
      
      body { background-color: white !important; color: #0f172a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; min-height: auto !important; }
      .print\:hidden { display: none !important; }
      .print\:flex { display: flex !important; }
      .print\:block { display: block !important; }
      
      main { display: block !important; margin: 0 !important; padding: 0 !important; max-width: none !important; grid-template-columns: 1fr !important; gap: 0 !important; }
      section { border: none !important; box-shadow: none !important; padding: 0 !important; min-height: auto !important; }
      
      .overflow-x-auto { overflow: visible !important; }
      table { width: 100% !important; border-collapse: collapse !important; page-break-inside: auto; border: 2px solid #0f172a !important; }
      tr { page-break-inside: avoid; page-break-after: auto; }
      
      /* Refined cell borders */
      th, td { 
        border: 1px solid #cbd5e1 !important; 
        padding: 5px 6px !important;
        line-height: 1.2 !important;
      }
      
      /* Solid black line under header */
      thead th { border-bottom: 2px solid #0f172a !important; }
      
      td img { 
        width: 64px !important; 
        height: 64px !important; 
        min-height: 64px !important;
        object-fit: contain !important;
      }

      .mb-8 { margin-bottom: 1rem !important; }
      .mb-6 { margin-bottom: 0.75rem !important; }
      .p-6 { padding: 0.75rem !important; }
      .mt-16 { margin-top: 1rem !important; }
      .pt-8 { padding-top: 0.5rem !important; }

      .page-break-inside-avoid { page-break-inside: avoid !important; }
    }
  </style>
</head>
<body>
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // --- HELPER FUNCTIONS ---
    const getFormattedDateTime = () => {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}_${hh}-${min}-${ss}`;
    };

    const compressImage = (file, maxWidth = 400, maxHeight = 400) => {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth || height > maxHeight) {
                        if (width > height) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        } else {
                            width = Math.round((width * maxHeight) / height);
                            height = maxHeight;
                        }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/webp', 0.8));
                };
            };
        });
    };

    const flattenObj = (ob, prefix = '') => {
        let result = {};
        for (const i in ob) {
            if (!Object.prototype.hasOwnProperty.call(ob, i)) continue;
            const key = prefix ? `${prefix}.${i}` : i;
            if (typeof ob[i] === 'object' && ob[i] !== null && !Array.isArray(ob[i])) {
                Object.assign(result, flattenObj(ob[i], key));
            } else {
                result[key] = ob[i];
            }
        }
        return result;
    };

    const unflattenObj = (flatOb) => {
        let result = {};
        for (const i in flatOb) {
            let keys = i.split('.');
            let current = result;
            for (let j = 0; j < keys.length; j++) {
                let key = keys[j];
                if (j === keys.length - 1) {
                    current[key] = flatOb[i];
                } else {
                    if (!current[key]) current[key] = {};
                    current = current[key];
                }
            }
        }
        return result;
    };

    // --- INITIAL DATA (DEFAULTS) ---
    const initialProductCategories = [
      { id: 'pc1', name: 'รางน้ำฝน (Gutters)' },
      { id: 'pc2', name: 'หลังคาและตะแกรง (Roofs & Mesh)' }
    ];

    const initialCategories = [
      { id: 'c1', name: 'Primo', discount: 12 },
      { id: 'c2', name: 'Primo Pipe', discount: 10 },
      { id: 'c3', name: 'Primo Adjuster', discount: 10 },
      { id: 'c4', name: 'Primo Mesh', discount: 10 },
    ];

    const initialMasterColors = [
      { id: 'v1', name: 'White (ขาว)' },
      { id: 'v2', name: 'Brown (น้ำตาล)' },
      { id: 'v3', name: 'Grey (เทา)' },
      { id: 'v4', name: 'Black (ดำ)' }
    ];

    const initialSalespersons = [
      { id: 'sp1', name: 'Admin Manager', phone: '080-000-0000', title: 'System Administrator' },
      { id: 'sp2', name: 'John Doe', phone: '081-123-4567', title: 'Sales Representative' }
    ];

    const initialProducts = [
      {
        id: 1, name: 'รางน้ำฝน วีจี พรีโม่', categoryId: 'c1', productCategoryId: 'pc1',
        image: 'https://placehold.co/200x200/f8fafc/94a3b8?text=Gutter',
        packQty: '10', unit: 'เส้น / มัด',
        prices: {
          v1: { available: true, dealerBox: 450, dealerUnbox: 465, sellingPrice: 520, retail: 560 },
          v2: { available: true, dealerBox: 480, dealerUnbox: 495, sellingPrice: 540, retail: 590 },
          v3: { available: true, dealerBox: 480, dealerUnbox: 495, sellingPrice: 540, retail: 590 },
          v4: { available: true, dealerBox: 480, dealerUnbox: 495, sellingPrice: 540, retail: 590 }
        }
      },
      {
        id: 2, name: 'ตะแกรงอลูมิเนียม', categoryId: 'c4', productCategoryId: 'pc2',
        image: 'https://placehold.co/200x200/f8fafc/94a3b8?text=Mesh',
        packQty: '50', unit: 'ชิ้น / ลัง',
        prices: {
          v1: { available: true, dealerBox: 95, dealerUnbox: 105, sellingPrice: 115, retail: 120 },
          v2: { available: true, dealerBox: 95, dealerUnbox: 105, sellingPrice: 115, retail: 120 },
          v3: { available: true, dealerBox: 95, dealerUnbox: 105, sellingPrice: 115, retail: 120 },
          v4: { available: true, dealerBox: 95, dealerUnbox: 105, sellingPrice: 115, retail: 120 }
        }
      }
    ];

    function App() {
      // --- APP CORE STATES ---
      const [isInitializing, setIsInitializing] = useState(true);
      const [showSetupScreen, setShowSetupScreen] = useState(false);
      const [isUnlocked, setIsUnlocked] = useState(false);
      
      // Admin Security State
      const [adminPassword, setAdminPassword] = useState('vgvgmanager');
      const [passwordForm, setPasswordForm] = useState({ newPass: '', confirmPass: '' });

      // --- APP DATA STATES ---
      const [activeTab, setActiveTab] = useState('lpPricelist');
      const [isSaving, setIsSaving] = useState(false);
      
      const [categories, setCategories] = useState([]);
      const [products, setProducts] = useState([]);
      const [masterColors, setMasterColors] = useState([]);
      
      const [productCategories, setProductCategories] = useState([]);
      const [selectedProductCategories, setSelectedProductCategories] = useState(['all']);
      const [isFilterDropdownOpen, setIsFilterDropdownOpen] = useState(false);

      const [company, setCompany] = useState({
        id: 'default_comp',
        name: 'บริษัท วี อาร์ จี มาร์เก็ตติ้ง จำกัด',
        address: 'เลขประจำตัวผู้เสียภาษี: 010 555 403 8564 (สำนักงานใหญ่)\nที่อยู่: 33/2 ม. 18 ตำบลศาลาแดง อำเภอบางน้ำเปรี้ยว จังหวัดฉะเชิงเทรา 24000',
        contact: 'โทร: 038-592-629, 087-654-7788',
        logo: 'https://placehold.co/150x150/1e3a8a/ffffff?text=LOGO'
      });

      const [savedCompanies, setSavedCompanies] = useState([company]);
      const [savedSalespersons, setSavedSalespersons] = useState([]); 
      
      const [selectedSalespersonId, setSelectedSalespersonId] = useState('');
      
      // Modals State
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [msgBox, setMsgBox] = useState({ isOpen: false, title: '', message: '', isError: false });
      const [confirmBox, setConfirmBox] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
      const [authBox, setAuthBox] = useState({ isOpen: false, passwordInput: '', error: '' });
      
      // Backup Export/Import States
      const [exportBox, setExportBox] = useState({ isOpen: false, password: '', confirmPassword: '' });
      const [importBox, setImportBox] = useState({ isOpen: false, payload: '', password: '', error: '' });

      // Database Form States
      const [compForm, setCompForm] = useState({ id: '', name: '', address: '', contact: '', logo: '' });
      const [isEditingComp, setIsEditingComp] = useState(false);
      
      const [spForm, setSpForm] = useState({ id: '', name: '', phone: '', title: '' });
      const [isEditingSp, setIsEditingSp] = useState(false);

      const [pcForm, setPcForm] = useState({ id: '', name: '' });
      const [isEditingPc, setIsEditingPc] = useState(false);

      const [colorForm, setColorForm] = useState({ id: '', name: '' });
      const [isEditingColor, setIsEditingColor] = useState(false);

      // Conflict Resolution Wizard State
      const [mergeWizard, setMergeWizard] = useState({ isOpen: false, type: '', queue: [], currentIndex: 0, newItems: [], resolvedItems: [], extraUpdates: {} });
      const [wizardDraftFlat, setWizardDraftFlat] = useState({});
      const [wizardExistingFlat, setWizardExistingFlat] = useState({});
      const [wizardImportedFlat, setWizardImportedFlat] = useState({});

      const [newProduct, setNewProduct] = useState({
        name: '', categoryId: '', productCategoryId: '', image: '', packQty: '', unit: '',
        prices: {} 
      });
      const [editProductId, setEditProductId] = useState(null);

      // Print exclusion state (Transient - resets on reload)
      const [excludedFromPrint, setExcludedFromPrint] = useState([]);

      // Sub-tab state for Database Management
      const [dbTab, setDbTab] = useState('entities');

      const stateRef = useRef({});
      stateRef.current = { categories, products, masterColors, company, savedCompanies, savedSalespersons, productCategories, adminPassword };

      // ==========================================
      // UTILITY: Custom Modals
      // ==========================================
      const showMessage = (title, message, isError = false) => {
          setMsgBox({ isOpen: true, title, message, isError });
      };

      const showConfirm = (title, message, onConfirmCallback) => {
          setConfirmBox({ isOpen: true, title, message, onConfirm: onConfirmCallback });
      };

      // ==========================================
      // EFFECTS (INITIALIZATION)
      // ==========================================
      const loadDataIntoState = (data) => {
          if (data.categories) setCategories(data.categories);
          if (data.products) setProducts(data.products);
          if (data.company) setCompany(data.company);
          if (data.savedCompanies) setSavedCompanies(data.savedCompanies);
          if (data.productCategories) setProductCategories(data.productCategories);
          if (data.masterColors) setMasterColors(data.masterColors);
          if (data.savedSalespersons) setSavedSalespersons(data.savedSalespersons);
          if (data.adminPassword) setAdminPassword(data.adminPassword);
      };

      const loadLocalData = async () => {
          try {
              let data = null;
              if (typeof window !== 'undefined' && window.localforage) {
                 data = await window.localforage.getItem('vg_pricelist_data');
              }
              if (!data) {
                const oldData = localStorage.getItem('vg_pricelist_data');
                if (oldData) data = JSON.parse(oldData);
              }
              
              if (data) {
                  loadDataIntoState(data);
                  setIsInitializing(false);
              } else {
                  setShowSetupScreen(true);
                  setIsInitializing(false);
              }
          } catch(e) { 
              console.error("Local Load Error", e); 
              setIsInitializing(false); 
          }
      };

      useEffect(() => {
          loadLocalData();
      }, []);

      useEffect(() => {
          if (mergeWizard.isOpen && mergeWizard.queue[mergeWizard.currentIndex]) {
              const current = mergeWizard.queue[mergeWizard.currentIndex];
              setWizardExistingFlat(flattenObj(current.existing));
              setWizardImportedFlat(flattenObj(current.imported));
              setWizardDraftFlat(flattenObj(current.draft));
          }
      }, [mergeWizard.isOpen, mergeWizard.currentIndex, mergeWizard.queue]);

      const handleWizardDraftChange = (key, val, originalType) => {
          let parsedVal = val;
          if (originalType === 'number' && val !== '') {
              parsedVal = Number(val);
          } else if (originalType === 'boolean') {
              parsedVal = val === 'true' || val === true;
          }
          setWizardDraftFlat(prev => ({ ...prev, [key]: parsedVal }));
      };

      const _forceSaveToLocal = async (overrideData = {}) => {
          try {
              const dataToSave = { ...stateRef.current, ...overrideData };
              if (typeof window !== 'undefined' && window.localforage) {
                  await window.localforage.setItem('vg_pricelist_data', dataToSave);
              } else {
                  localStorage.setItem('vg_pricelist_data', JSON.stringify(dataToSave));
              }
          } catch (err) {
              showMessage("Save Error", "Could not save data locally. Your browser might be out of storage.", true);
          }
      };

      const categoryDiscountMap = useMemo(() => {
          const map = new Map();
          categories.forEach(c => map.set(c.id, c.discount));
          return map;
      }, [categories]);

      const getDiscountedPrice = useCallback((basePrice, categoryId) => {
        const discount = categoryDiscountMap.get(categoryId) || 0;
        const discountedPrice = basePrice * (1 - (discount / 100));
        return (Math.ceil(discountedPrice * 100) / 100).toFixed(2);
      }, [categoryDiscountMap]);

      // ==========================================
      // SETUP SCREEN & SECURITY ACTIONS
      // ==========================================
      const handleStartFresh = async () => {
          const defaultData = {
              categories: initialCategories,
              products: initialProducts,
              masterColors: initialMasterColors,
              productCategories: initialProductCategories,
              savedSalespersons: initialSalespersons,
              company: company,
              savedCompanies: [company],
              adminPassword: 'vgvgmanager' // Default reset
          };
          
          loadDataIntoState(defaultData);
          await _forceSaveToLocal(defaultData);
          setShowSetupScreen(false);
          showMessage("Welcome", "Initialized with a fresh database.");
      };

      const handlePasswordChangeSubmit = async (e) => {
          e.preventDefault();
          if (passwordForm.newPass !== passwordForm.confirmPass) {
              return showMessage("Error", "Passwords do not match.", true);
          }
          if (passwordForm.newPass.length < 4) {
              return showMessage("Error", "Password must be at least 4 characters.", true);
          }
          
          setAdminPassword(passwordForm.newPass);
          await _forceSaveToLocal({ adminPassword: passwordForm.newPass });
          setPasswordForm({ newPass: '', confirmPass: '' });
          showMessage("Success", "Edit Mode password successfully changed and saved.");
      };

      // ==========================================
      // BACKUP EXPORT / IMPORT (Encrypted)
      // ==========================================
      const triggerExportBackup = () => {
          setExportBox({ isOpen: true, password: '', confirmPassword: '' });
      };

      const executeExportBackup = (e) => {
          e.preventDefault();
          if (exportBox.password !== exportBox.confirmPassword) {
              return showMessage("Encryption Error", "Passwords do not match.", true);
          }
          
          const dataToExport = { ...stateRef.current };
          let finalData;

          if (exportBox.password) {
              // Encrypt payload
              const encrypted = CryptoJS.AES.encrypt(JSON.stringify(dataToExport), exportBox.password).toString();
              finalData = JSON.stringify({ isEncrypted: true, payload: encrypted });
          } else {
              // Unencrypted plain JSON
              finalData = JSON.stringify(dataToExport);
          }

          const blob = new Blob([finalData], { type: "text/plain;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = `VG_Pricelist_Master_${getFormattedDateTime()}.vgbackup`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
          
          setExportBox({ isOpen: false, password: '', confirmPassword: '' });
      };

      const handleBackupFileSelect = async (e) => {
        const fileInput = e.target;
        const file = fileInput.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = async (event) => {
          const fileContent = event.target.result;
          try {
            if (fileContent.includes("<!DOCTYPE html>")) throw new Error("HTML");
            const parsed = JSON.parse(fileContent);

            if (parsed.isEncrypted && parsed.payload) {
                setImportBox({ isOpen: true, payload: parsed.payload, password: '', error: '' });
            } else {
                // Legacy / Unencrypted file
                loadDataIntoState(parsed);
                await _forceSaveToLocal(parsed); 
                setShowSetupScreen(false);
                showMessage("Success", "Master File retrieved and linked successfully.");
            }
          } catch (error) {
            showMessage("Import Error", "The file is corrupted or invalid. Please select a valid .vgbackup master file.", true);
          }
          fileInput.value = '';
        };
        reader.readAsText(file);
      };

      const executeImportBackup = async (e) => {
          e.preventDefault();
          try {
              const bytes = CryptoJS.AES.decrypt(importBox.payload, importBox.password);
              const decryptedString = bytes.toString(CryptoJS.enc.Utf8);
              
              if (!decryptedString) throw new Error("Decryption failed");
              
              const decryptedData = JSON.parse(decryptedString);
              loadDataIntoState(decryptedData);
              await _forceSaveToLocal(decryptedData);
              
              setShowSetupScreen(false);
              setImportBox({ isOpen: false, payload: '', password: '', error: '' });
              showMessage("Success", "Master File decrypted and restored successfully.");
          } catch (err) {
              setImportBox({ ...importBox, error: "Incorrect password. Failed to decrypt file." });
          }
      };


      // ==========================================
      // EXCEL IMPORT / EXPORT (Standard)
      // ==========================================
      const exportToExcel = (dataArray, filename) => {
          if (!window.XLSX) return showMessage("Error", "Excel library not loaded.", true);
          const worksheet = window.XLSX.utils.json_to_sheet(dataArray);
          const workbook = window.XLSX.utils.book_new();
          window.XLSX.utils.book_append_sheet(workbook, worksheet, "Sheet1");
          window.XLSX.writeFile(workbook, `${filename}.xlsx`);
      };

      const importFromExcel = (file, callback) => {
          if (!window.XLSX) return showMessage("Error", "Excel library not loaded.", true);
          const reader = new FileReader();
          reader.onload = (e) => {
              try {
                  const data = new Uint8Array(e.target.result);
                  const workbook = window.XLSX.read(data, {type: 'array'});
                  const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                  const json = window.XLSX.utils.sheet_to_json(worksheet);
                  callback(json);
              } catch(err) {
                  showMessage("Import Error", "Error reading Excel file. Ensure it is properly formatted.", true);
              }
          };
          reader.readAsArrayBuffer(file);
      };

      const handleExcelExport = (type) => {
          if (type === 'products') {
              const flatData = products.map(p => {
                  const baseRow = {
                      ID: p.id,
                      Name: p.name,
                      ProductCategory: productCategories.find(c=>c.id===p.productCategoryId)?.name || '',
                      DiscountCategory: categories.find(c=>c.id===p.categoryId)?.name || '',
                      PackQty: p.packQty,
                      Unit: p.unit,
                      ImageURL: p.image
                  };
                  
                  const priceColumns = masterColors.reduce((acc, c) => {
                      const pData = p.prices[c.id];
                      acc[`${c.name}_Available`] = (pData && pData.available === false) ? 'No' : 'Yes';
                      acc[`${c.name}_DealerBox`] = pData?.dealerBox || 0;
                      acc[`${c.name}_DealerUnbox`] = pData?.dealerUnbox || 0;
                      acc[`${c.name}_SellingPrice`] = pData?.sellingPrice || 0;
                      acc[`${c.name}_ListPrice`] = pData?.retail || 0;
                      return acc;
                  }, {});

                  return { ...baseRow, ...priceColumns };
              });
              exportToExcel(flatData, `VG_Products_${getFormattedDateTime()}`);
          } else if (type === 'users') {
              const flatData = savedSalespersons.map(u => ({
                  ID: u.id,
                  FullName: u.name,
                  Phone: u.phone,
                  Title: u.title
              }));
              exportToExcel(flatData, `VG_Users_${getFormattedDateTime()}`);
          } else if (type === 'categories') {
              const flatData = productCategories.map(c => ({ ID: c.id, Name: c.name }));
              exportToExcel(flatData, `VG_Product_Categories_${getFormattedDateTime()}`);
          }
      };

      const finalizeExcelImport = async (type, newItems, resolvedItems, extraUpdates) => {
          let overrides = {};
          if (type === 'products') {
              const merged = [...products.filter(p => !resolvedItems.find(r => r.id === p.id)), ...resolvedItems, ...newItems];
              setProducts(merged);
              overrides.products = merged;
          } else if (type === 'users') {
              const merged = [...savedSalespersons.filter(u => !resolvedItems.find(r => r.id === u.id)), ...resolvedItems, ...newItems];
              setSavedSalespersons(merged);
              overrides.savedSalespersons = merged;
          } else if (type === 'categories') {
              const merged = [...productCategories.filter(c => !resolvedItems.find(r => r.id === c.id)), ...resolvedItems, ...newItems];
              setProductCategories(merged);
              overrides.productCategories = merged;
          }
          
          if (extraUpdates && extraUpdates.categories) {
              setProductCategories(extraUpdates.categories);
              overrides.productCategories = extraUpdates.categories;
          }
          
          const totalImported = newItems.length + resolvedItems.length;
          await _forceSaveToLocal(overrides);
          
          showMessage("Import Successful", `Handled ${totalImported} items (Merged: ${resolvedItems.length}, Added: ${newItems.length}). Data saved.`);
      };

      const handleExcelImport = (e, type) => {
          const file = e.target.files[0];
          if (!file) return;

          importFromExcel(file, (json) => {
              let queue = [];
              let newItems = [];
              let autoResolved = [];
              let extraUpdates = {};

              const checkDiff = (imp, ex) => {
                  const flatImp = flattenObj(imp);
                  const flatEx = flattenObj(ex);
                  for (let key in flatImp) {
                      if (key === 'id') continue;
                      
                      const valImp = flatImp[key] !== undefined && flatImp[key] !== null ? String(flatImp[key]).trim() : '';
                      const valEx = flatEx[key] !== undefined && flatEx[key] !== null ? String(flatEx[key]).trim() : '';
                      
                      if (!isNaN(valImp) && !isNaN(valEx) && valImp !== '' && valEx !== '') {
                           if (Number(valImp) !== Number(valEx)) return true;
                      } else if (valImp !== valEx) {
                           if (key === 'image' && valImp.includes('placehold.co') && valEx !== '') continue;
                           return true;
                      }
                  }
                  return false;
              };

              if (type === 'products') {
                  json.forEach(row => {
                      if(!row.Name && !row.ID) return;
                      const pc = productCategories.find(c => c.name === row.ProductCategory)?.id || productCategories[0]?.id || '';
                      const dc = categories.find(c => c.name === row.DiscountCategory)?.id || categories[0]?.id || '';
                      
                      const parsedPrices = masterColors.reduce((acc, c) => {
                          acc[c.id] = {
                              available: row[`${c.name}_Available`] === 'No' ? false : true,
                              dealerBox: parseFloat(row[`${c.name}_DealerBox`]) || 0,
                              dealerUnbox: parseFloat(row[`${c.name}_DealerUnbox`]) || 0,
                              sellingPrice: parseFloat(row[`${c.name}_SellingPrice`]) || 0,
                              retail: parseFloat(row[`${c.name}_ListPrice`]) || 0,
                          };
                          return acc;
                      }, {});

                      const importedObj = {
                          id: row.ID || 'prod_' + Date.now() + Math.random().toString(36).substr(2, 9),
                          name: row.Name || 'Unnamed',
                          productCategoryId: pc,
                          categoryId: dc,
                          packQty: row.PackQty?.toString() || '1',
                          unit: row.Unit || 'pcs',
                          image: row.ImageURL || 'https://placehold.co/200x200/f8fafc/94a3b8?text=Image',
                          prices: parsedPrices
                      };
                      
                      const existing = products.find(p => p.id == row.ID || (row.Name && p.name.toLowerCase() === row.Name.toLowerCase()));
                      if (existing) {
                          if (checkDiff(importedObj, existing)) {
                              queue.push({ imported: importedObj, existing, draft: JSON.parse(JSON.stringify({...importedObj, id: existing.id})) });
                          } else {
                              autoResolved.push(existing);
                          }
                      } else {
                          newItems.push(importedObj);
                      }
                  });
              } 
              else if (type === 'users') {
                  json.forEach(row => {
                      if (!row.FullName && !row.ID) return;
                      
                      const importedObj = {
                          id: row.ID || 'usr_' + Date.now() + Math.random().toString(36).substr(2, 5),
                          name: row.FullName || 'Imported User',
                          phone: row.Phone || '-',
                          title: row.Title || 'Staff'
                      };
                      const existing = savedSalespersons.find(u => u.id == row.ID || (row.FullName && u.name === row.FullName));
                      if (existing) {
                          if (checkDiff(importedObj, existing)) {
                              queue.push({ imported: importedObj, existing, draft: JSON.parse(JSON.stringify({...importedObj, id: existing.id})) }); 
                          } else {
                              autoResolved.push(existing);
                          }
                      } else {
                          newItems.push(importedObj);
                      }
                  });
              } 
              else if (type === 'categories') {
                  json.forEach(row => {
                      if (!row.Name && !row.ID) return;
                      const importedObj = { id: row.ID || 'pc' + Date.now() + Math.random().toString(36).substr(2,4), name: row.Name || 'Unnamed' };
                      const existing = productCategories.find(c => c.id == row.ID || (row.Name && c.name === row.Name));
                      if (existing) {
                          if (checkDiff(importedObj, existing)) {
                              queue.push({ imported: importedObj, existing, draft: JSON.parse(JSON.stringify({...importedObj, id: existing.id})) });
                          } else {
                              autoResolved.push(existing);
                          }
                      } else {
                          newItems.push(importedObj);
                      }
                  });
              }

              if (queue.length > 0) {
                  setMergeWizard({ isOpen: true, type, queue, currentIndex: 0, newItems, resolvedItems: autoResolved, extraUpdates });
              } else {
                  finalizeExcelImport(type, newItems, autoResolved, extraUpdates);
              }
          });
          e.target.value = null; // reset
      };

      const handleWizardAction = (action) => {
          const current = mergeWizard.queue[mergeWizard.currentIndex];
          let resolvedItem = null;
          
          if (action === 'use_existing') {
              resolvedItem = current.existing;
          } else if (action === 'use_imported') {
              resolvedItem = { ...current.imported, id: current.existing.id };
          } else if (action === 'use_draft') {
              resolvedItem = unflattenObj(wizardDraftFlat);
              resolvedItem.id = current.existing.id; 
          }
          
          const newResolvedItems = [...mergeWizard.resolvedItems, resolvedItem];
          
          if (mergeWizard.currentIndex < mergeWizard.queue.length - 1) {
              setMergeWizard({ ...mergeWizard, currentIndex: mergeWizard.currentIndex + 1, resolvedItems: newResolvedItems });
          } else {
              finalizeExcelImport(mergeWizard.type, mergeWizard.newItems, newResolvedItems, mergeWizard.extraUpdates);
              setMergeWizard({ isOpen: false, type: '', queue: [], currentIndex: 0, newItems: [], resolvedItems: [], extraUpdates: {} });
          }
      };


      // ==========================================
      // DATABASE & FORM HANDLERS
      // ==========================================
      const handleSaveAll = async () => {
        setIsSaving(true);
        await _forceSaveToLocal();
        setTimeout(() => setIsSaving(false), 1000); 
      };

      const handlePrint = () => {
        const selectedSP = savedSalespersons.find(s => s.id === selectedSalespersonId);
        if (!selectedSP) {
          showMessage("Missing Information", "Please select a Salesperson from the Company Info panel before printing.", true);
          return;
        }
        window.print();
      };

      const handleSaveCompDB = async (e) => {
        e.preventDefault();
        let newSavedCompanies;
        let newCompany = company;

        if(isEditingComp) {
            newSavedCompanies = savedCompanies.map(c => c.id === compForm.id ? compForm : c);
            if(company.id === compForm.id) newCompany = compForm;
        } else {
            newSavedCompanies = [...savedCompanies, { ...compForm, id: Date.now().toString() }];
        }
        
        setSavedCompanies(newSavedCompanies);
        if (company.id === compForm.id || !isEditingComp) {
            setCompany(newCompany);
        }
        
        await _forceSaveToLocal({ savedCompanies: newSavedCompanies, company: newCompany });
        setCompForm({ id: '', name: '', address: '', contact: '', logo: '' });
        setIsEditingComp(false);
      };
      
      const handleEditComp = (c) => { setCompForm(c); setIsEditingComp(true); };
      
      const handleDeleteComp = async (id) => {
        showConfirm("Delete Company?", "Are you sure you want to delete this company profile?", async () => {
            const newSavedCompanies = savedCompanies.filter(c => c.id !== id);
            let newCompany = company;
            
            setSavedCompanies(newSavedCompanies);
            if(company.id === id) {
                newCompany = { id: '', name: '', address: '', contact: '', logo: '' };
                setCompany(newCompany);
            }
            await _forceSaveToLocal({ savedCompanies: newSavedCompanies, company: newCompany });
        });
      };

      const handleDbLogoUpload = async (e) => {
        const file = e.target.files[0];
        if (file) {
          const compressed = await compressImage(file, 300, 300);
          setCompForm({ ...compForm, logo: compressed });
        }
      };

      const handleSavePcDB = async (e) => {
        e.preventDefault();
        let newPc;
        if (isEditingPc) {
            newPc = productCategories.map(c => c.id === pcForm.id ? pcForm : c);
        } else {
            newPc = [...productCategories, { ...pcForm, id: 'pc' + Date.now().toString() }];
        }
        setProductCategories(newPc);
        await _forceSaveToLocal({ productCategories: newPc });
        setPcForm({ id: '', name: '' });
        setIsEditingPc(false);
      };
      
      const handleEditPc = (c) => { setPcForm(c); setIsEditingPc(true); };
      
      const handleDeletePc = async (id) => {
        showConfirm("Delete Product Category?", "Delete this Category? This will remove the category tag from assigned products.", async () => {
            const newPc = productCategories.filter(c => c.id !== id);
            const newProducts = products.map(p => p.productCategoryId === id ? { ...p, productCategoryId: '' } : p);
            setProductCategories(newPc);
            setProducts(newProducts);
            await _forceSaveToLocal({ productCategories: newPc, products: newProducts });
        });
      };

      const handleSaveColorDB = async (e) => {
        e.preventDefault();
        let newColors;
        if (isEditingColor) {
            newColors = masterColors.map(c => c.id === colorForm.id ? colorForm : c);
        } else {
            newColors = [...masterColors, { ...colorForm, id: 'color_' + Date.now().toString() }];
        }
        setMasterColors(newColors);
        await _forceSaveToLocal({ masterColors: newColors });
        setColorForm({ id: '', name: '' });
        setIsEditingColor(false);
      };
      
      const handleEditColor = (c) => { setColorForm(c); setIsEditingColor(true); };
      
      const handleDeleteColor = async (id) => {
        showConfirm("Delete Product Color?", "Delete this Color? This will permanently remove the color column and its associated prices from all products!", async () => {
            const newColors = masterColors.filter(c => c.id !== id);
            setMasterColors(newColors);
            await _forceSaveToLocal({ masterColors: newColors });
        });
      };

      const handleSaveSpDB = async (e) => {
        e.preventDefault();
        const userToSave = { ...spForm };
        let newUsers;

        if(isEditingSp) {
            newUsers = savedSalespersons.map(s => s.id === spForm.id ? userToSave : s);
        } else {
            newUsers = [...savedSalespersons, { ...userToSave, id: Date.now().toString() }];
        }
        
        setSavedSalespersons(newUsers);
        await _forceSaveToLocal({ savedSalespersons: newUsers });
        
        setSpForm({ id: '', name: '', phone: '', title: '' });
        setIsEditingSp(false);
      };

      const handleEditSp = (s) => { setSpForm(s); setIsEditingSp(true); };

      const handleDeleteSp = async (id) => {
        showConfirm("Delete User?", "Are you sure you want to delete this user profile?", async () => {
            const newUsers = savedSalespersons.filter(s => s.id !== id);
            setSavedSalespersons(newUsers);
            if (selectedSalespersonId === id) setSelectedSalespersonId('');
            await _forceSaveToLocal({ savedSalespersons: newUsers });
        });
      };


      // ==========================================
      // PRICELIST & PRODUCT HANDLERS
      // ==========================================
      const updateCategory = async (id, field, value) => {
          const newCats = categories.map(c => c.id === id ? { ...c, [field]: field === 'discount' ? parseFloat(value) || 0 : value } : c);
          setCategories(newCats);
          await _forceSaveToLocal({ categories: newCats });
      };

      const addCategory = async () => {
          const newCats = [...categories, { id: Date.now().toString(), name: 'New Discount', discount: 0 }];
          setCategories(newCats);
          await _forceSaveToLocal({ categories: newCats });
      };

      const removeCategory = async (id) => {
          const newCats = categories.filter(c => c.id !== id);
          const newProds = products.map(p => p.categoryId === id ? { ...p, categoryId: '' } : p);
          setCategories(newCats);
          setProducts(newProds);
          await _forceSaveToLocal({ categories: newCats, products: newProds });
      };
      
      const updateProductCategory = async (productId, categoryId) => {
          const newProds = products.map(p => p.id === productId ? { ...p, categoryId } : p);
          setProducts(newProds);
          await _forceSaveToLocal({ products: newProds });
      };

      const executeDeleteProduct = async (id) => {
        const newProducts = products.filter(p => p.id !== id);
        setProducts(newProducts); 
        await _forceSaveToLocal({ products: newProducts });
      };

      const moveProductUp = async (absoluteIndex) => {
        if (absoluteIndex <= 0) return;
        const newProducts = [...products];
        const temp = newProducts[absoluteIndex];
        newProducts[absoluteIndex] = newProducts[absoluteIndex - 1];
        newProducts[absoluteIndex - 1] = temp;
        setProducts(newProducts);
        await _forceSaveToLocal({ products: newProducts });
      };

      const moveProductDown = async (absoluteIndex) => {
        if (absoluteIndex >= products.length - 1) return;
        const newProducts = [...products];
        const temp = newProducts[absoluteIndex];
        newProducts[absoluteIndex] = newProducts[absoluteIndex + 1];
        newProducts[absoluteIndex + 1] = temp;
        setProducts(newProducts);
        await _forceSaveToLocal({ products: newProducts });
      };

      const handleImageUpload = async (e) => {
        const file = e.target.files[0];
        if (file) {
          const compressed = await compressImage(file, 400, 400);
          setNewProduct({ ...newProduct, image: compressed });
        }
      };

      const handlePriceChange = (colorId, field, value) => {
          setNewProduct(prev => ({
              ...prev,
              prices: { 
                  ...prev.prices, 
                  [colorId]: { 
                      ...(prev.prices[colorId] || { available: true, dealerBox: '', dealerUnbox: '', sellingPrice: '', retail: '' }), 
                      [field]: value 
                  } 
              }
          }));
      };

      const handleOpenAddModal = () => {
          setEditProductId(null);
          const initialPrices = {};
          masterColors.forEach(c => {
              initialPrices[c.id] = { available: true, dealerBox: '', dealerUnbox: '', sellingPrice: '', retail: '' };
          });
          setNewProduct({
              name: '', categoryId: categories[0]?.id || '', productCategoryId: productCategories[0]?.id || '', image: '', packQty: '', unit: '',
              prices: initialPrices
          });
          setIsModalOpen(true);
      };

      const handleOpenEditModal = (product) => {
          setEditProductId(product.id);
          const editPrices = {};
          masterColors.forEach(c => {
              const pData = product.prices[c.id] || { available: true, dealerBox: '', dealerUnbox: '', sellingPrice: '', retail: '' };
              editPrices[c.id] = { ...pData };
          });
          setNewProduct({
              name: product.name,
              categoryId: product.categoryId || '',
              productCategoryId: product.productCategoryId || '',
              image: product.image || '',
              packQty: product.packQty || '',
              unit: product.unit || '',
              prices: editPrices
          });
          setIsModalOpen(true);
      };

      const handleAddProductSubmit = async (e) => {
        e.preventDefault();
        
        const parsedPrices = {};
        for(const [cId, pData] of Object.entries(newProduct.prices)) {
             parsedPrices[cId] = {
                 available: pData.available,
                 dealerBox: parseFloat(pData.dealerBox) || 0,
                 dealerUnbox: parseFloat(pData.dealerUnbox) || 0,
                 sellingPrice: parseFloat(pData.sellingPrice) || 0,
                 retail: parseFloat(pData.retail) || 0
             };
        }

        const productData = {
          name: newProduct.name || 'Unnamed Product',
          categoryId: newProduct.categoryId || categories[0]?.id,
          productCategoryId: newProduct.productCategoryId || productCategories[0]?.id || '',
          image: newProduct.image || `https://placehold.co/200x200/f8fafc/94a3b8?text=Image`,
          packQty: newProduct.packQty || '-',
          unit: newProduct.unit || '-',
          prices: parsedPrices
        };
        
        let newProducts;
        if (editProductId) {
            newProducts = products.map(p => p.id === editProductId ? { ...p, ...productData } : p);
        } else {
            productData.id = Date.now();
            newProducts = [...products, productData];
        }
        
        setProducts(newProducts);
        setIsModalOpen(false);
        setEditProductId(null);
        await _forceSaveToLocal({ products: newProducts });
      };

      const toggleProductCategory = (id) => {
         if (id === 'all') {
             setSelectedProductCategories(['all']);
         } else {
             let newSel = selectedProductCategories.filter(catId => catId !== 'all');
             if (newSel.includes(id)) {
                 newSel = newSel.filter(catId => catId !== id);
                 if (newSel.length === 0) newSel = ['all'];
             } else {
                 newSel.push(id);
             }
             setSelectedProductCategories(newSel);
         }
      };

      const filteredProducts = useMemo(() => {
          return products.filter(p => 
              selectedProductCategories.includes('all') || 
              selectedProductCategories.includes(p.productCategoryId)
          );
      }, [products, selectedProductCategories]);

      const togglePrintAll = () => {
          if (excludedFromPrint.length === filteredProducts.length && filteredProducts.length > 0) {
              setExcludedFromPrint([]); // Select All
          } else {
              setExcludedFromPrint(filteredProducts.map(p => p.id)); // Deselect All
          }
      };

      const togglePrintVisibility = (productId) => {
          setExcludedFromPrint(prev => 
              prev.includes(productId) ? prev.filter(id => id !== productId) : [...prev, productId]
          );
      };

      const visibleColors = useMemo(() => {
          if (filteredProducts.length === 0) return masterColors;
          
          return masterColors.filter(color => {
              return filteredProducts.some(p => {
                  const pData = p.prices[color.id];
                  return pData && pData.available !== false; 
              });
          });
      }, [masterColors, filteredProducts]);

      // ==========================================
      // REUSABLE COMPONENTS
      // ==========================================
      const PrintHeader = ({ title, subtitle }) => {
        return (
          <div className="hidden print:block mb-6 w-full relative">
            <div className="absolute top-0 left-0 w-full h-[3px] bg-slate-900"></div>
            <div className="flex justify-between items-start pt-6 pb-6 border-b border-gray-300 mb-6">
              <div className="flex items-center gap-6">
                {company.logo && <img src={company.logo} alt="Logo" className="w-24 h-24 object-contain" />}
                <div className="flex-1 mt-1">
                  <h1 className="text-2xl font-extrabold text-slate-900 tracking-tight leading-tight">{company.name}</h1>
                  <p className="text-[11px] text-gray-600 mt-2 whitespace-pre-wrap leading-relaxed">{company.address}</p>
                  <p className="text-[11px] text-gray-600 mt-0.5">{company.contact}</p>
                </div>
              </div>
              <div className="text-right mt-1 flex flex-col justify-start">
                <h2 className="text-2xl font-black text-slate-900 uppercase tracking-widest">{title}</h2>
                {subtitle && <p className="text-sm font-bold text-gray-500 tracking-widest mt-1">{subtitle}</p>}
                <p className="text-xs font-semibold text-gray-800 mt-4">Date: <span className="font-normal">{new Date().toLocaleString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</span></p>
              </div>
            </div>
          </div>
        );
      };

      const PrintFooterSignature = () => {
        const selectedSP = savedSalespersons.find(s => s.id === selectedSalespersonId) || { name: '_____________________', phone: '_____________________' };
        return (
            <div className="hidden print:block mt-12 pt-6 page-break-inside-avoid relative">
              <div className="absolute top-0 left-12 right-12 border-t border-gray-300"></div>
              <div className="flex justify-between text-center px-16 items-start">
                <div className="w-64 flex flex-col items-center">
                  <div className="h-20 w-full"></div>
                  <div className="border-b border-gray-400 w-56 mb-2"></div>
                  <p className="text-sm font-extrabold text-slate-900">{selectedSP.name}</p>
                  <p className="text-[10px] text-gray-600 mt-0.5">เบอร์ติดต่อ: {selectedSP.phone}</p>
                  <p className="text-[10px] text-slate-500 mt-1.5 uppercase tracking-wider font-semibold">Salesperson</p>
                </div>
                <div className="w-64 flex flex-col items-center">
                  <div className="h-20 w-full"></div>
                  <div className="border-b border-gray-400 w-56 mb-2"></div>
                  <p className="text-[10px] text-slate-500 mt-1.5 uppercase tracking-wider font-semibold">Authorized Signature</p>
                </div>
              </div>
            </div>
        );
      };


      // ==========================================
      // EARLY RETURNS (Initialization only)
      // ==========================================
      if (isInitializing) {
          return <div className="min-h-screen bg-gray-100 flex items-center justify-center"><i className="fas fa-spinner fa-spin text-4xl text-blue-600"></i></div>;
      }

      // ==========================================
      // MAIN RENDER APP UI
      // ==========================================
      return (
        <>
          {showSetupScreen ? (
             <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 relative overflow-hidden">
                 <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-blue-900/40 blur-3xl"></div>
                 <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-blue-800/20 blur-3xl"></div>

                 <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 relative z-10 animate-in fade-in slide-in-from-bottom-4 duration-500">
                     <div className="text-center mb-8">
                         <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white shadow-md">
                            <i className="fas fa-hdd text-blue-600 text-3xl"></i>
                         </div>
                         <h2 className="text-2xl font-black text-slate-900 tracking-tight">Missing Master Data</h2>
                         <p className="text-sm text-gray-500 mt-2 leading-relaxed">We could not find the local database on this device. Please locate and link your Master Backup file to continue.</p>
                     </div>

                     <div className="space-y-4">
                         <label className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-all shadow-md cursor-pointer flex flex-col items-center justify-center gap-1 group relative overflow-hidden">
                             <div className="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                             <i className="fas fa-file-import text-2xl mb-1 relative z-10"></i>
                             <span className="relative z-10 text-sm">Locate Master File (.vgbackup)</span>
                             <input type="file" accept=".vgbackup,.json,.txt,*/*" onChange={handleBackupFileSelect} className="hidden" />
                         </label>

                         <div className="relative py-4 flex items-center justify-center">
                            <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-gray-200"></div></div>
                            <span className="relative bg-white px-4 text-xs text-gray-400 font-bold uppercase tracking-wider">OR</span>
                         </div>

                         <button onClick={handleStartFresh} className="w-full py-3 bg-gray-50 border border-gray-200 text-gray-600 hover:bg-gray-100 rounded-xl font-bold transition-colors shadow-sm flex items-center justify-center gap-2">
                             <i className="fas fa-magic"></i> Start Fresh (Empty DB)
                         </button>
                     </div>
                 </div>
             </div>
          ) : (
             <div className="min-h-screen bg-gray-100 text-slate-800 font-sans pb-12 relative">
               
               {/* TOP NAVIGATION */}
               <header className="bg-blue-900 text-white shadow-md print:hidden sticky top-0 z-30">
                 <div className="max-w-[1400px] mx-auto px-4 flex justify-between items-center h-16">
                   <div className="flex items-center gap-3">
                     <i className="fas fa-image text-blue-300 text-2xl"></i>
                     <div className="flex flex-col">
                         <span className="text-xl font-bold tracking-wide leading-none">Pricelist Manager</span>
                         <span className="text-[9px] text-yellow-300 uppercase tracking-widest font-bold mt-1 flex items-center gap-1">
                             <i className="fas fa-hdd text-yellow-400"></i> Local Storage Mode
                         </span>
                     </div>
                   </div>
                   
                   <div className="flex space-x-1 bg-blue-950 p-1 rounded-lg hidden lg:flex">
                     <button onClick={() => setActiveTab('lpPricelist')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium transition-colors ${activeTab === 'lpPricelist' ? 'bg-blue-600 text-white shadow' : 'text-blue-200 hover:text-white hover:bg-blue-800'}`}>
                       <i className="fas fa-list text-[14px]"></i> LP Pricelist
                     </button>
                     <button onClick={() => setActiveTab('simplePricelist')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium transition-colors ${activeTab === 'simplePricelist' ? 'bg-blue-600 text-white shadow' : 'text-blue-200 hover:text-white hover:bg-blue-800'}`}>
                       <i className="fas fa-file-alt text-[14px]"></i> Simple Pricelist
                     </button>
                     <button onClick={() => setActiveTab('databases')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium transition-colors ${activeTab === 'databases' ? 'bg-blue-600 text-white shadow' : 'text-blue-200 hover:text-white hover:bg-blue-800'}`}>

                     <div className="flex gap-2">

                     {isUnlocked && (

                         </button>
                     )}
                     
                     {activeTab === 'lpPricelist' && isUnlocked && (
                       <button onClick={handleOpenAddModal} className="flex items-center gap-1.5 bg-white text-blue-900 hover:bg-blue-50 px-3 py-1.5 rounded-md text-xs font-bold transition-colors">
                         <i className="fas fa-plus text-[14px]"></i> Add Product
                       </button>
                     )}

                     <button onClick={handlePrint} className="flex items-center gap-1.5 bg-blue-500 hover:bg-blue-400 text-white px-3 py-1.5 rounded-md text-xs font-bold transition-colors shadow-sm">
                       <i className="fas fa-print text-[14px]"></i> Print PDF
                     </button>

                     <div className="ml-2 pl-3 border-l border-blue-800 flex items-center gap-3">
                         <button onClick={() => {
                                 if (isUnlocked) setIsUnlocked(false);
                                 else setAuthBox({ isOpen: true, passwordInput: '', error: '' });
                             }} 
                             className={`flex items-center gap-2 px-3 py-1.5 rounded-md text-xs font-bold transition-all shadow-sm ${isUnlocked ? 'bg-emerald-600 hover:bg-emerald-500 text-white' : 'bg-slate-700 hover:bg-slate-600 text-white border border-slate-500'}`}>
                            {isUnlocked ? <i className="fas fa-unlock"></i> : <i className="fas fa-lock"></i>}

                         </button>
                     </div>
                   </div>
                 </div>
               </header>

               <div className="lg:hidden bg-blue-950 p-2 flex justify-center space-x-2 print:hidden">
                    <button onClick={() => setActiveTab('lpPricelist')} className={`px-4 py-2 rounded-md text-xs font-medium transition-colors ${activeTab === 'lpPricelist' ? 'bg-blue-600 text-white' : 'text-blue-200'}`}>LP Pricelist</button>
                    <button onClick={() => setActiveTab('simplePricelist')} className={`px-4 py-2 rounded-md text-xs font-medium transition-colors ${activeTab === 'simplePricelist' ? 'bg-blue-600 text-white' : 'text-blue-200'}`}>Simple Pricelist</button>
                    <button onClick={() => setActiveTab('databases')} className={`px-4 py-2 rounded-md text-xs font-medium transition-colors ${activeTab === 'databases' ? 'bg-blue-600 text-white' : 'text-blue-200'}`}>Databases</button>
               </div>

               <main className="max-w-[1400px] mx-auto mt-6 px-4 grid grid-cols-1 lg:grid-cols-5 gap-6">
                 
                 {/* --- LEFT SIDEBAR --- */}
                 <aside className="lg:col-span-1 print:hidden space-y-6">
                   <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                     <div className="flex justify-between items-center mb-4 border-b pb-2">
                       <h2 className="text-sm font-bold text-gray-800 flex items-center gap-2">
                         <i className="fas fa-building text-[16px] text-blue-600"></i>
                         Company Info
                       </h2>
                     </div>
                     <div className="space-y-3">
                       <select value={company.id || ''} onChange={(e) => {
                           const selected = savedCompanies.find(c => c.id === e.target.value);
                           if (selected) setCompany(selected);
                           else setCompany({ id: '', name: '', address: '', contact: '', logo: '' });
                         }}
                         disabled={activeTab === 'databases' && !isUnlocked}
                         className={`w-full text-xs p-1.5 border rounded outline-none font-bold text-blue-900 shadow-sm ${activeTab === 'databases' && !isUnlocked ? 'bg-gray-100 cursor-not-allowed' : 'bg-blue-50 focus:border-blue-500 cursor-pointer'}`}
                       >
                         <option value="" disabled>-- Select Company --</option>
                         {savedCompanies.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                       </select>

                       <textarea value={company.address} readOnly className="w-full text-[11px] p-2 border rounded outline-none h-20 resize-none bg-gray-50 text-gray-600 cursor-default" placeholder="Address & Tax ID" />
                       <input type="text" value={company.contact} readOnly className="w-full text-[11px] p-2 border rounded outline-none bg-gray-50 text-gray-600 cursor-default" placeholder="Contact Info" />
                       <div className="flex items-center gap-3">
                         {company.logo ? (
                           <img src={company.logo} alt="Logo" className="w-10 h-10 object-contain border rounded bg-white shadow-sm" />
                         ) : (
                           <div className="w-10 h-10 border rounded bg-gray-100 flex items-center justify-center text-gray-400"><i className="fas fa-image"></i></div>
                         )}
                         <span className="text-[10px] text-gray-500 italic flex-1">Configure in Databases tab</span>
                       </div>
                       
                       <div className="pt-3 border-t border-gray-200 mt-4">
                         <label className="block text-[11px] font-bold text-gray-700 mb-1">Select Salesperson (For Print)</label>
                         <select value={selectedSalespersonId} onChange={e => setSelectedSalespersonId(e.target.value)} className="w-full text-xs p-1.5 border rounded outline-none bg-emerald-50 border-emerald-200 text-emerald-900 font-bold cursor-pointer">
                             <option value="">-- Choose Salesperson --</option>
                             {savedSalespersons.map(s => <option key={s.id} value={s.id}>{s.name} ({s.title})</option>)}
                         </select>

                         <label className="block text-[11px] font-bold text-gray-700 mb-1 mt-2">Phone Number</label>
                         <input type="text" value={savedSalespersons.find(s => s.id === selectedSalespersonId)?.phone || ''} readOnly className="w-full text-xs p-1.5 border rounded outline-none bg-gray-50 text-gray-600 font-bold cursor-default" placeholder="Auto-filled" />
                       </div>
                     </div>
                   </div>

                   {(activeTab === 'lpPricelist' || activeTab === 'databases') && (
                     <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5 animate-in fade-in slide-in-from-top-4">
                       <div className="flex justify-between items-center mb-4 border-b pb-2">
                           <h2 className="text-sm font-bold text-gray-800 flex items-center gap-2">
                             <i className="fas fa-cog text-[16px] text-blue-600"></i> Base Discounts (%)
                           </h2>
                           {!isUnlocked && <span className="text-[10px] text-red-500">(Read-Only)</span>}
                       </div>
                       <div className="space-y-3">
                         {categories.map((cat) => (
                           <div key={cat.id} className="flex gap-2 items-center bg-slate-50 p-1.5 rounded border border-slate-100 group">
                             <input type="text" disabled={!isUnlocked} value={cat.name} onChange={(e) => updateCategory(cat.id, 'name', e.target.value)} className="w-full text-xs font-medium bg-transparent outline-none px-1 disabled:opacity-80" />
                             <div className="relative w-20 flex-shrink-0">
                               <input type="number" disabled={!isUnlocked} value={cat.discount} onChange={(e) => updateCategory(cat.id, 'discount', e.target.value)} className="w-full pl-2 pr-5 py-1 text-xs border border-gray-300 rounded outline-none disabled:bg-gray-100" />
                               <i className="fas fa-percent text-[10px] absolute right-1.5 top-1.5 text-gray-400"></i>
                             </div>
                             {isUnlocked && (
                                 <button onClick={() => removeCategory(cat.id)} className="text-red-400 hover:text-red-600 opacity-50 group-hover:opacity-100 transition-opacity p-0.5" title="Remove Category">
                                   <i className="fas fa-trash text-[14px]"></i>
                                 </button>
                             )}
                           </div>
                         ))}
                       </div>
                       {isUnlocked && (
                           <button onClick={addCategory} className="mt-3 w-full text-xs text-blue-600 font-semibold border border-dashed border-blue-300 rounded py-1.5 hover:bg-blue-50">+ Add Category</button>
                       )}
                     </div>
                   )}

                   {activeTab === 'simplePricelist' && (
                     <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5 animate-in fade-in slide-in-from-top-4 print:hidden">
                       <h2 className="text-sm font-bold text-gray-800 flex items-center gap-2 mb-4 border-b pb-2">
                         <i className="fas fa-info-circle text-[16px] text-blue-600"></i>
                         Applied Discounts
                       </h2>
                       <p className="text-xs text-gray-500 mb-3">Discounts applied to Dealer (ครบลัง) prices.</p>
                       <div className="space-y-2">
                         {categories.map((cat) => (
                           <div key={cat.id} className="flex justify-between items-center bg-slate-50 p-2 rounded border border-slate-100">
                             <span className="text-xs font-medium text-gray-700">{cat.name}</span>
                             <span className="text-xs font-bold text-gray-900">{cat.discount}%</span>
                           </div>
                         ))}
                       </div>
                     </div>
                   )}
                 </aside>

                 {/* --- MAIN CONTENT AREA --- */}
                 <section className={`lg:col-span-4 bg-white rounded-xl shadow-sm border border-gray-200 p-6 min-h-[700px] ${activeTab === 'databases' ? 'print:hidden' : ''}`}>
                   
                   {/* TAB 1: LP PRICELIST */}
                   {activeTab === 'lpPricelist' && (
                     <div className="animate-in fade-in duration-300">
                       <PrintHeader title="VG PRODUCT PRICELIST (LP)" subtitle="(ใบแจ้งราคา)" />
                       
                       <div className="print:hidden mb-4 bg-gray-50 border border-gray-200 p-3 rounded-lg flex flex-col sm:flex-row items-start sm:items-center gap-3">
                         <div className="relative">
                           <button onClick={() => setIsFilterDropdownOpen(!isFilterDropdownOpen)} className="flex items-center gap-2 bg-white border border-gray-300 text-gray-700 text-xs font-bold py-1.5 px-4 rounded-full hover:bg-gray-100 shadow-sm transition-colors">
                             <i className="fas fa-filter text-blue-500"></i> Filter Categories <i className="fas fa-chevron-down text-[10px] ml-1"></i>
                           </button>
                           {isFilterDropdownOpen && (
                             <>
                               <div className="fixed inset-0 z-40" onClick={() => setIsFilterDropdownOpen(false)}></div>
