                                   <div className="flex flex-col gap-1">
                                     <label className="flex items-center gap-2 px-2 py-1.5 hover:bg-slate-50 rounded cursor-pointer text-sm">
                                       <input type="checkbox" checked={selectedProductCategories.includes('all')} onChange={() => toggleProductCategory('all')} className="rounded text-blue-600 focus:ring-blue-500 cursor-pointer" />
                                       <span className={selectedProductCategories.includes('all') ? 'font-bold text-blue-600' : 'font-medium text-gray-700'}>All Products</span>
                                     </label>
                                     <div className="h-px bg-gray-100 my-1"></div>
                                     {productCategories.map(cat => (
                                       <label key={cat.id} className="flex items-center gap-2 px-2 py-1.5 hover:bg-slate-50 rounded cursor-pointer text-sm">
                                         <input type="checkbox" checked={selectedProductCategories.includes(cat.id)} onChange={() => toggleProductCategory(cat.id)} className="rounded text-blue-600 focus:ring-blue-500 cursor-pointer" />
                                         <span className={selectedProductCategories.includes(cat.id) ? 'font-bold text-blue-600' : 'font-medium text-gray-700'}>{cat.name}</span>
                                       </label>
                                     ))}
                                   </div>
                               </div>
                             </>
                           )}
                         </div>
                         <div className="flex gap-2 flex-wrap flex-1 items-center">
                           <span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider mr-1">Active:</span>
                           {selectedProductCategories.includes('all') ? (
                             <span className="bg-blue-100 text-blue-800 text-[10px] font-bold px-2.5 py-1 rounded-full border border-blue-200 shadow-sm">All Products</span>
                           ) : (
                             selectedProductCategories.map(catId => {
                                 const cat = productCategories.find(c => c.id === catId);
                                 if (!cat) return null;
                                 return (
                                   <span key={cat.id} className="bg-blue-100 text-blue-800 text-[10px] font-bold px-2.5 py-1 rounded-full border border-blue-200 shadow-sm flex items-center gap-1.5 animate-in zoom-in-95">
                                       {cat.name}
                                       <button onClick={() => toggleProductCategory(cat.id)} className="text-blue-400 hover:text-red-500 flex items-center justify-center transition-colors"><i className="fas fa-times"></i></button>
                                   </span>
                                 );
                             })
                           )}
                         </div>
                       </div>

                       <div className="overflow-x-auto print:overflow-visible">
                         <table className="w-full text-left border-collapse min-w-[900px] print:min-w-0">
                           <thead>
                             <tr className="bg-slate-900 text-white text-sm print:text-[11px] uppercase tracking-wider align-middle text-center">
                               <th className="p-3 w-12 text-center align-middle border-r border-slate-800 print:hidden" title="Include/Exclude from Print">
                                 <button onClick={togglePrintAll} className="text-gray-300 hover:text-white transition-colors">
                                   <i className={`fas ${excludedFromPrint.length === filteredProducts.length ? 'fa-eye-slash' : 'fa-print'}`}></i>
                                 </button>
                               </th>
                               <th className="p-3 font-bold text-center align-middle border-r border-slate-800 print:w-[28%]">Products<span className="block text-[10px] font-normal text-gray-300 print:text-[9px] mt-0.5">(รายการสินค้า)</span></th>
                               <th className="p-3 font-bold text-center align-middle w-20 border-r border-slate-800 print:w-[12%]">Pack Size<span className="block text-[10px] font-normal text-gray-300 print:text-[9px] mt-0.5">(ขนาดแพ็ค)</span></th>
                               {visibleColors.map((color, i) => (
                                 <th key={color.id} className={`p-2 font-bold text-center align-middle border-r border-slate-800 ${i%2===0 ? 'bg-slate-800' : 'bg-slate-900'}`}>
                                   <span className="text-center font-bold w-full block">{color.name}</span>
                                   <div className="hidden print:flex flex-col items-center justify-center w-full">
                                     <span className="tracking-wide text-sm print:text-[11px]">{color.name.split(' (')[0]}</span>
                                     {color.name.includes(' (') && <span className="block text-[10px] font-normal text-gray-300 print:text-[9px] mt-0.5">({color.name.split(' (')[1]}</span>}
                                   </div>
                                 </th>
                               ))}
                               {isUnlocked && <th className="p-2 w-16 text-center align-middle bg-slate-900 print:hidden"></th>}
                             </tr>
                           </thead>
                           <tbody className="divide-y divide-gray-200">
                             {filteredProducts.map((product) => {
                               const absoluteIndex = products.findIndex(p => p.id === product.id);
                               const isExcluded = excludedFromPrint.includes(product.id);
                               return (
                               <tr key={product.id} className={`hover:bg-slate-50 group bg-white transition-all ${isExcluded ? 'print:hidden opacity-40 grayscale-[50%] bg-gray-100' : ''}`}>
                                 <td className="p-2 text-center print:hidden border-r border-gray-200 align-middle">
                                   <input 
                                     type="checkbox" 
                                     checked={!isExcluded} 
                                     onChange={() => togglePrintVisibility(product.id)} 
                                     className="w-4 h-4 text-blue-600 rounded cursor-pointer"
                                     title="Include in PDF"
                                   />
                                 </td>
                                 <td className="p-3 border-r border-gray-200 align-middle">
                                   <p className="font-extrabold text-slate-900 leading-snug print:text-[12px]">{product.name}</p>
                                   <img src={product.image} alt="" className="w-24 h-24 print:w-32 print:h-32 object-contain rounded border border-gray-200 my-2 print:mx-auto" />
                                   <select disabled={!isUnlocked} value={product.categoryId} onChange={(e) => updateProductCategory(product.id, e.target.value)} className="mt-1 text-[11px] text-blue-700 bg-blue-50 border border-blue-200 rounded px-1 py-0.5 outline-none print:hidden disabled:opacity-80 disabled:cursor-not-allowed">
                                     {categories.map(c => <option key={c.id} value={c.id}>{c.name} ({c.discount}%)</option>)}
                                   </select>
                                 </td>
                                 <td className="p-2 text-center border-r border-gray-200 align-middle">
                                   <p className="font-bold text-[15px] text-slate-800 print:text-[13px]">{product.packQty}</p>
                                   <p className="text-[11px] text-slate-500 font-medium print:text-[10px]">{product.unit}</p>
                                 </td>
                                 {visibleColors.map((color, i) => {
                                   const pData = product.prices[color.id];
                                   const isAvailable = pData && pData.available !== false;

                                   if (!isAvailable) {
                                       return <td key={color.id} className="p-2 border-r border-gray-200 align-middle bg-slate-50/50 text-center"><span className="text-[10px] text-gray-400 italic font-semibold uppercase tracking-wider">Not Available</span></td>;
                                   }

                                   const dealerBoxPriceStr = getDiscountedPrice(pData.dealerBox ?? pData.dealer ?? 0, product.categoryId);
                                   const packQtyNum = parseFloat(product.packQty) || 0;
                                   const boxTotalFormatted = (parseFloat(dealerBoxPriceStr) * packQtyNum).toLocaleString('en-US', {minimumFractionDigits: 2});
                                   
                                   return (
                                     <td key={color.id} className={`p-2 border-r border-gray-200 align-middle ${i%2===0 ? 'bg-slate-50/50' : 'bg-white'}`}>
                                       <div className="flex flex-col justify-between items-center h-full space-y-1.5 print:space-y-2.5 py-1.5">
                                         <div className="text-center w-full">
                                           <span className="text-[9px] text-gray-500 uppercase font-semibold print:text-[7px] block mb-0.5">Dealer (ครบลัง)</span>
                                           <span className="font-black text-slate-900 text-[13px] print:text-[11px]">฿{dealerBoxPriceStr}{packQtyNum > 0 && <span className="text-[10px] text-slate-600 font-medium ml-1 print:text-[9px]">({boxTotalFormatted})</span>}</span>
                                         </div>
                                         <div className="w-[90%] border-b border-dotted border-gray-300"></div>
                                         <div className="text-center w-full">
                                           <span className="text-[9px] text-gray-500 uppercase font-semibold print:text-[7px] block mb-0.5">Dealer (ไม่ครบลัง)</span>
                                           <span className="font-bold text-slate-700 text-[12px] print:text-[10px]">฿{parseFloat(pData.dealerUnbox ?? pData.dealer ?? 0).toFixed(2)}</span>
                                         </div>
                                         <div className="w-[90%] border-b border-dotted border-gray-300"></div>
                                         <div className="text-center w-full">
                                           <span className="text-[9px] text-emerald-700 uppercase font-bold print:text-[7px] block mb-0.5">Selling Price (แนะนำขาย)</span>
                                           <span className="font-bold text-emerald-700 text-[11px] print:text-[9px]">฿{parseFloat(pData.sellingPrice ?? pData.retail ?? 0).toFixed(2)}</span>
                                         </div>
                                         <div className="w-[90%] border-b border-dotted border-gray-300"></div>
                                         <div className="text-center w-full">
                                           <span className="text-[9px] text-slate-500 uppercase print:text-[7px] font-medium block mb-0.5">List Price (ราคาตั้ง)</span>
                                           <span className="font-semibold text-slate-600 text-[11px] print:text-[9px]">฿{parseFloat(pData.retail ?? 0).toFixed(2)}</span>
                                         </div>
                                       </div>
                                     </td>
                                   );
                                 })}
                                 {isUnlocked && (
                                     <td className="p-2 text-center print:hidden border-r-0 align-middle">
                                       <div className="flex flex-col items-center gap-1.5 opacity-30 group-hover:opacity-100 transition-opacity">
                                         <div className="flex gap-1">
                                           <button onClick={() => moveProductUp(absoluteIndex)} disabled={absoluteIndex <= 0} className="p-1 bg-gray-200 text-gray-600 rounded hover:bg-blue-100 hover:text-blue-600 disabled:opacity-30 disabled:cursor-not-allowed" title="Move Up"><i className="fas fa-chevron-up text-[12px] w-4"></i></button>
                                           <button onClick={() => moveProductDown(absoluteIndex)} disabled={absoluteIndex >= products.length - 1} className="p-1 bg-gray-200 text-gray-600 rounded hover:bg-blue-100 hover:text-blue-600 disabled:opacity-30 disabled:cursor-not-allowed" title="Move Down"><i className="fas fa-chevron-down text-[12px] w-4"></i></button>
                                         </div>
                                         <div className="flex gap-1 w-full">
                                            <button onClick={() => handleOpenEditModal(product)} className="text-yellow-600 hover:text-yellow-700 transition-colors p-1 rounded hover:bg-yellow-50 flex-1" title="Edit Product"><i className="fas fa-pen text-[14px]"></i></button>
                                            <button onClick={() => showConfirm("Delete Product", `Are you sure you want to remove "${product.name}"?`, () => executeDeleteProduct(product.id))} className="text-red-400 hover:text-red-600 transition-colors p-1 rounded hover:bg-red-50 flex-1" title="Remove Product"><i className="fas fa-trash text-[14px]"></i></button>
                                         </div>
                                       </div>
                                     </td>
                                 )}
                               </tr>
                             )})}
                           </tbody>
                         </table>
                       </div>
                       <PrintFooterSignature />
                     </div>
                   )}

                   {/* TAB 1.5: SIMPLE PRICELIST */}
                   {activeTab === 'simplePricelist' && (
                     <div className="animate-in fade-in duration-300">
                       <PrintHeader title="VG PRODUCT PRICELIST (SP)" subtitle="(ใบแจ้งราคา)" />
                       <div className="overflow-x-auto print:overflow-visible">
                         <table className="w-full text-left border-collapse min-w-[900px] print:min-w-0 mt-4">
                           <thead>
                             <tr className="bg-slate-900 text-white text-sm print:text-[11px] uppercase tracking-wider align-middle text-center">
                               <th className="p-3 w-12 text-center align-middle border-r border-slate-800 print:hidden" title="Include/Exclude from Print">
                                 <button onClick={togglePrintAll} className="text-gray-300 hover:text-white transition-colors">
                                   <i className={`fas ${excludedFromPrint.length === filteredProducts.length ? 'fa-eye-slash' : 'fa-print'}`}></i>
                                 </button>
                               </th>
                               <th className="p-3 font-bold text-center align-middle border-r border-slate-800 print:w-[28%]">Products<span className="block text-[10px] font-normal text-gray-300 print:text-[9px] mt-0.5">(รายการสินค้า)</span></th>
                               <th className="p-3 font-bold text-center align-middle w-20 border-r border-slate-800 print:w-[12%]">Pack Size<span className="block text-[10px] font-normal text-gray-300 print:text-[9px] mt-0.5">(ขนาดแพ็ค)</span></th>
                               {visibleColors.map((color, i) => (
                                 <th key={color.id} className={`p-2 font-bold text-center align-middle border-r border-slate-800 ${i%2===0 ? 'bg-slate-800' : 'bg-slate-900'}`}>

                                 </div>

                                 </div>

                                      </div>

                             </div>

                                             <div><label className="block text-[10px] font-bold text-gray-600 mb-1">Phone Number</label><input required type="text" placeholder="08x-xxx-xxxx" value={spForm.phone} onChange={e => setSpForm({...spForm, phone: e.target.value})} className="w-full text-sm p-2 border border-gray-300 rounded outline-none focus:border-blue-500 bg-white" /></div>

                                         </div>

                                        </div>
                                    )}
                                  </div>
                                ))}
                             </div>
                           </div>

                          </div>
                          <h3 className="text-xl font-black text-gray-900">Export Backup</h3>
                          <p className="text-xs text-gray-500 mt-2">Set an encryption password for this backup file. If you leave it blank, the backup will not be encrypted.</p>
                      </div>
                      <form onSubmit={executeExportBackup}>
                          <div className="space-y-3 mb-5">
                              <input type="password" placeholder="Encryption Password (Optional)" value={exportBox.password} onChange={e => setExportBox({...exportBox, password: e.target.value})} className="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50 font-bold" />
                              {exportBox.password.length > 0 && (
                                  <input type="password" required placeholder="Confirm Password" value={exportBox.confirmPassword} onChange={e => setExportBox({...exportBox, confirmPassword: e.target.value})} className="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50 font-bold animate-in fade-in" />
                              )}
                          </div>
                          <div className="flex gap-3">
                              <button type="button" onClick={() => setExportBox({isOpen: false, password: '', confirmPassword: ''})} className="flex-1 py-3 bg-gray-100 text-gray-700 rounded-lg font-bold hover:bg-gray-200 transition-colors">Cancel</button>
                              <button type="submit" className="flex-1 py-3 bg-purple-600 text-white rounded-lg font-bold hover:bg-purple-700 transition-colors shadow-sm">Save Backup</button>
                          </div>
                      </form>
                  </div>
              </div>
          )}

          {/* Import Backup Modal (Decryption) */}
          {importBox.isOpen && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[400] p-4">
                  <div className="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 animate-in zoom-in-95 duration-200">
                      <div className="text-center mb-6">
                          <div className="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
                              <i className="fas fa-key text-yellow-600 text-[28px]"></i>
                          </div>
                          <h3 className="text-xl font-black text-gray-900">Encrypted Backup</h3>
                          <p className="text-xs text-gray-500 mt-2">This Master File is encrypted. Enter the password used during export to restore your data.</p>
                      </div>
                      <form onSubmit={executeImportBackup}>
                          <div className="mb-4">
                              <input type="password" autoFocus placeholder="Decryption Password" value={importBox.password} onChange={e => setImportBox({...importBox, password: e.target.value, error: ''})} className={`w-full p-3 border rounded-lg outline-none focus:ring-2 bg-gray-50 text-center tracking-widest font-bold ${importBox.error ? 'border-red-500 focus:ring-red-500 text-red-600' : 'border-gray-300 focus:ring-blue-500 text-slate-800'}`} />
                              {importBox.error && <p className="text-xs text-red-500 font-bold mt-2 text-center">{importBox.error}</p>}
                          </div>
                          <div className="flex gap-3">
                              <button type="button" onClick={() => setImportBox({isOpen: false, payload: '', password: '', error: ''})} className="flex-1 py-3 bg-gray-100 text-gray-700 rounded-lg font-bold hover:bg-gray-200 transition-colors">Cancel</button>
                              <button type="submit" className="flex-1 py-3 bg-yellow-500 text-white rounded-lg font-bold hover:bg-yellow-600 transition-colors shadow-sm">Decrypt</button>
                          </div>
                      </form>
                  </div>
              </div>
          )}

          {/* Auth Unlock Modal */}
          {authBox.isOpen && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[400] p-4 print:hidden">
                  <div className="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 animate-in zoom-in-95 duration-200">
                      <div className="text-center mb-6">
                          <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                              <i className="fas fa-lock text-blue-600 text-[28px]"></i>
                          </div>
                          <h3 className="text-xl font-black text-gray-900">Unlock Edit Mode</h3>
                          <p className="text-xs text-gray-500 mt-2">Enter the admin password to make changes.</p>
                      </div>
                      <form onSubmit={(e) => {
                          e.preventDefault();
                          if (authBox.passwordInput === adminPassword) {
                              setIsUnlocked(true);
                              setAuthBox({ isOpen: false, passwordInput: '', error: '' });
                          } else {
                              setAuthBox({ ...authBox, error: 'Incorrect password.' });
                          }
                      }}>
                          <div className="mb-4">
                              <input type="password" autoFocus placeholder="Password" value={authBox.passwordInput} onChange={e => setAuthBox({...authBox, passwordInput: e.target.value, error: ''})} className={`w-full p-3 border rounded-lg outline-none focus:ring-2 bg-gray-50 text-center tracking-widest font-bold ${authBox.error ? 'border-red-500 focus:ring-red-500 text-red-600' : 'border-gray-300 focus:ring-blue-500 text-slate-800'}`} />
                              {authBox.error && <p className="text-xs text-red-500 font-bold mt-2 text-center">{authBox.error}</p>}
                          </div>
                          <div className="flex gap-3">
                              <button type="button" onClick={() => setAuthBox({ isOpen: false, passwordInput: '', error: '' })} className="flex-1 py-3 bg-gray-100 text-gray-700 rounded-lg font-bold hover:bg-gray-200 transition-colors">Cancel</button>
                              <button type="submit" className="flex-1 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-sm">Unlock</button>
                          </div>
                      </form>
                  </div>
              </div>
          )}

          {/* System Message Modal */}
          {msgBox.isOpen && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[500] p-4 print:hidden">
                  <div className="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 text-center animate-in zoom-in-95 duration-200">
                      <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${msgBox.isError ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'}`}>
                          <i className={`fas ${msgBox.isError ? 'fa-exclamation-triangle' : 'fa-info-circle'} text-[32px]`}></i>
                      </div>
                      <h3 className="text-lg font-bold text-gray-900 mb-2">{msgBox.title}</h3>
                      <p className="text-sm text-gray-600 mb-6">{msgBox.message}</p>
                      <button onClick={() => setMsgBox({ isOpen: false, title: '', message: '', isError: false })} className="w-full py-2.5 bg-gray-100 text-gray-800 rounded-lg font-bold hover:bg-gray-200 transition-colors">Close</button>
                  </div>
              </div>
          )}

          {/* Confirm Dialog Modal */}
          {confirmBox.isOpen && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[500] p-4 print:hidden">
                  <div className="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 text-center animate-in zoom-in-95 duration-200">
                      <div className="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4 text-yellow-600">
                          <i className="fas fa-question-circle text-[32px]"></i>
                      </div>
                      <h3 className="text-lg font-bold text-gray-900 mb-2">{confirmBox.title}</h3>
                      <p className="text-sm text-gray-600 mb-6">{confirmBox.message}</p>
                      <div className="flex gap-3">
                          <button onClick={() => setConfirmBox({ isOpen: false, title: '', message: '', onConfirm: null })} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg font-bold hover:bg-gray-200 transition-colors">Cancel</button>
                          <button onClick={() => {
                              if (confirmBox.onConfirm) confirmBox.onConfirm();
                              setConfirmBox({ isOpen: false, title: '', message: '', onConfirm: null });
                          }} className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-sm">Confirm</button>
                      </div>
                  </div>
              </div>
          )}
          
          {/* EXCEL MERGE WIZARD */}
          {mergeWizard.isOpen && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-[400] p-4 print:hidden">
               <div className="bg-white rounded-xl shadow-2xl w-full max-w-[1200px] max-h-[90vh] flex flex-col animate-in zoom-in-95">
                  <div className="p-5 border-b border-gray-200 flex justify-between items-center bg-white rounded-t-xl">
                     <h3 className="text-xl font-black text-slate-900 flex items-center gap-2">
                         <div className="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"><i className="fas fa-table"></i></div>
                         Resolve Import Conflicts ({mergeWizard.currentIndex + 1} of {mergeWizard.queue.length})
                     </h3>
                     <button onClick={() => {
                         showConfirm("Cancel Import?", "Cancel import? No changes will be saved.", () => {
                             setMergeWizard({isOpen: false, type: '', queue: [], currentIndex: 0, newItems: [], resolvedItems: [], extraUpdates: {}});
                         });
                     }} className="text-gray-400 hover:text-red-500 transition-colors"><i className="fas fa-times text-2xl"></i></button>
                  </div>
                  
                  <div className="p-6 overflow-y-auto flex-1 bg-slate-50 flex flex-col gap-6">
                      <div className="bg-blue-50 border border-blue-200 p-4 rounded-lg text-sm text-blue-800 shadow-sm flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                          <span className="flex-1"><i className="fas fa-info-circle mr-1"></i> A record with this ID/Name already exists. Review the differences below and edit the <strong>Final Merged Data</strong> column directly (like an Excel sheet) to resolve the conflict.</span>
                          <div className="flex gap-2 flex-shrink-0">
                              <button onClick={() => handleWizardAction('use_existing')} className="px-4 py-2 bg-red-100 text-red-700 font-bold text-xs rounded hover:bg-red-200 transition-colors shadow-sm border border-red-200"><i className="fas fa-arrow-left mr-1"></i> Keep Existing</button>
                              <button onClick={() => handleWizardAction('use_imported')} className="px-4 py-2 bg-emerald-100 text-emerald-700 font-bold text-xs rounded hover:bg-emerald-200 transition-colors shadow-sm border border-emerald-200"><i className="fas fa-arrow-left mr-1"></i> Use Imported</button>
                          </div>
                      </div>
                      
                      <div className="overflow-x-auto w-full border border-gray-200 rounded-lg shadow-sm bg-white">
                         <table className="w-full text-left text-sm whitespace-nowrap">
                           <thead className="bg-slate-800 text-white">
                              <tr>
                                <th className="p-3 font-bold w-1/4">Field Name</th>
                                <th className="p-3 font-bold w-1/4 bg-red-900/50">Existing Data (In App)</th>
                                <th className="p-3 font-bold w-1/4 bg-emerald-900/50">Imported Data (Excel)</th>
                                <th className="p-3 font-bold w-1/4 bg-blue-900/50">Final Merged Data (Edit)</th>
                              </tr>
                           </thead>
                           <tbody className="divide-y divide-gray-200">
                             {Object.keys(wizardDraftFlat).map(key => {
                                if (typeof wizardDraftFlat[key] === 'object') return null;
      
                                const isId = key === 'id';
                                const originalType = typeof wizardExistingFlat[key];
                                const inputType = originalType === 'number' ? 'number' : 'text';
                                
                                const isDiff = String(wizardExistingFlat[key]) !== String(wizardImportedFlat[key]);
      
                                return (
                                  <tr key={key} className={`hover:bg-blue-50/50 ${isDiff ? 'bg-yellow-50/30' : 'bg-white'}`}>
                                    <td className="p-3 font-bold text-slate-700 border-r border-gray-100">
                                      {key} {isDiff && <span className="ml-2 text-[9px] bg-yellow-200 text-yellow-800 px-1.5 py-0.5 rounded uppercase font-bold tracking-wider">Diff</span>}
                                    </td>
                                    <td className="p-3 text-red-700 border-r border-gray-100 max-w-[200px] overflow-hidden text-ellipsis" title={String(wizardExistingFlat[key] ?? '-')}>
                                      {String(wizardExistingFlat[key] ?? '-')}
                                    </td>
                                    <td className="p-3 text-emerald-700 border-r border-gray-100 max-w-[200px] overflow-hidden text-ellipsis" title={String(wizardImportedFlat[key] ?? '-')}>
                                      {String(wizardImportedFlat[key] ?? '-')}
                                    </td>
                                    <td className="p-2 bg-blue-50/30">
                                      <input 
                                        type={inputType}
                                        disabled={isId}
                                        value={wizardDraftFlat[key] ?? ''}
                                        onChange={(e) => handleWizardDraftChange(key, e.target.value, originalType)}
                                        className={`w-full p-2 border rounded outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all ${isId ? 'bg-gray-100 cursor-not-allowed text-gray-500 border-transparent' : 'bg-white font-bold text-blue-800 border-blue-200 shadow-sm'}`}
                                      />
                                    </td>
                                  </tr>
                                );
                             })}
                           </tbody>
                         </table>
                      </div>
      
                      <div className="flex justify-end mt-2">
                           <button onClick={() => handleWizardAction('use_draft')} className="px-8 py-3 bg-blue-600 text-white font-bold text-sm rounded-lg hover:bg-blue-700 transition-transform active:scale-95 shadow-md flex items-center gap-2">
                               Save Custom Merge & Next <i className="fas fa-arrow-right"></i>
                           </button>
                      </div>
                  </div>
               </div>
            </div>
          )}

          {/* --- ADD/EDIT PRODUCT MODAL --- */}
          {isModalOpen && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[400] p-4 print:hidden">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-[1200px] max-h-[90vh] overflow-y-auto animate-in zoom-in-95">
                <div className="flex justify-between items-center p-5 border-b border-gray-200 sticky top-0 bg-white z-10 shadow-sm">
                  <h3 className="text-xl font-bold text-gray-900">{editProductId ? 'Edit Product' : 'Add New Product'}</h3>
                  <button onClick={() => { setIsModalOpen(false); setEditProductId(null); }} className="text-gray-400 hover:text-gray-700"><i className="fas fa-times text-[24px]"></i></button>
                </div>
                
                <form onSubmit={handleAddProductSubmit} className="p-6 space-y-6 bg-gray-50">
                  <div className="grid grid-cols-1 md:grid-cols-4 gap-4 bg-white p-5 rounded-lg shadow-sm border border-gray-100">
                    <div className="md:col-span-1 border-r border-gray-100 pr-4 flex flex-col items-center justify-center">
                      <label className="block text-xs font-bold text-gray-700 mb-2 w-full text-left">Product Image</label>
                      <div className="w-32 h-32 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center bg-gray-50 relative overflow-hidden group">
                        {newProduct.image ? (
                          <img src={newProduct.image} alt="Preview" className="w-full h-full object-contain p-1" />
                        ) : (
                          <div className="text-center text-gray-400">
                            <i className="fas fa-image text-[32px] mx-auto mb-1 opacity-50"></i>
                            <span className="text-[10px] block mt-1">Upload</span>
                          </div>
                        )}
                        <input type="file" accept="image/*" onChange={handleImageUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                        <div className="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center pointer-events-none">
                          <i className="fas fa-upload text-white text-[20px]"></i>
                        </div>
                      </div>
                      <p className="text-[9px] text-gray-400 mt-2 text-center">Click to upload image file.</p>
                    </div>

                    <div className="md:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-4 pl-0 md:pl-2">
                      <div className="md:col-span-2">
                        <label className="block text-xs font-bold text-gray-700 mb-1">Product Name</label>
                        <input required type="text" value={newProduct.name} onChange={e => setNewProduct({...newProduct, name: e.target.value})} className="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-blue-500 outline-none" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1">Product Category</label>
                        <select required value={newProduct.productCategoryId} onChange={e => setNewProduct({...newProduct, productCategoryId: e.target.value})} className="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                          <option value="" disabled>Select a category...</option>
                          {productCategories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1">Discount Category</label>
                        <select required value={newProduct.categoryId} onChange={e => setNewProduct({...newProduct, categoryId: e.target.value})} className="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                          <option value="" disabled>Select a discount group...</option>
                          {categories.map(c => <option key={c.id} value={c.id}>{c.name} ({c.discount}%)</option>)}
                        </select>
                      </div>
                      <div className="md:col-span-2">
                        <label className="block text-xs font-bold text-gray-700 mb-1">Pack Qty & Unit</label>
                        <div className="flex gap-2">
                          <input type="number" min="0" step="any" placeholder="Qty" value={newProduct.packQty} onChange={e => setNewProduct({...newProduct, packQty: e.target.value})} className="w-1/2 p-2 text-sm border rounded focus:ring-2 focus:ring-blue-500 outline-none" />
                          <input type="text" placeholder="Unit" value={newProduct.unit} onChange={e => setNewProduct({...newProduct, unit: e.target.value})} className="w-1/2 p-2 text-sm border rounded focus:ring-2 focus:ring-blue-500 outline-none" />
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                    {masterColors.map((color) => {
                      const pData = newProduct.prices[color.id] || { available: true, dealerBox: '', dealerUnbox: '', sellingPrice: '', retail: '' };
                      return (
                      <div key={color.id} className={`bg-white p-4 rounded-lg shadow-sm border border-gray-200 transition-opacity ${pData.available ? 'opacity-100' : 'opacity-60 bg-gray-50'}`}>
                        <div className="flex flex-col items-center border-b border-gray-100 pb-2 mb-3 bg-blue-50 py-1.5 rounded">
                            <h4 className="font-bold text-blue-900 text-sm text-center truncate w-full px-2" title={color.name}>{color.name}</h4>
                            <label className="flex items-center gap-1.5 text-[10px] font-bold text-gray-600 mt-1 cursor-pointer">
                                <input type="checkbox" checked={pData.available} onChange={(e) => handlePriceChange(color.id, 'available', e.target.checked)} className="w-3 h-3 rounded text-blue-600 focus:ring-blue-500 cursor-pointer" /> 
                                {pData.available ? <span className="text-emerald-600">Available</span> : <span className="text-red-500">Not Available</span>}
                            </label>
                        </div>
                        {pData.available ? (
                            <div className="space-y-2">
                              <div><label className="block text-[10px] font-bold text-blue-700 uppercase">Dealer (ครบลัง)</label><input type="number" value={pData.dealerBox} onChange={e => handlePriceChange(color.id, 'dealerBox', e.target.value)} className="w-full p-1 text-sm border rounded focus:ring-1 focus:ring-blue-500 outline-none mt-1" /></div>
                              <div><label className="block text-[10px] font-bold text-blue-500 uppercase">Dealer (ไม่ครบลัง)</label><input type="number" value={pData.dealerUnbox} onChange={e => handlePriceChange(color.id, 'dealerUnbox', e.target.value)} className="w-full p-1 text-sm border rounded focus:ring-1 focus:ring-blue-500 outline-none mt-1" /></div>
                              <div className="border-t border-gray-100 pt-1 mt-1"><label className="block text-[10px] font-bold text-emerald-600 uppercase">Selling Price (แนะนำขาย)</label><input type="number" value={pData.sellingPrice} onChange={e => handlePriceChange(color.id, 'sellingPrice', e.target.value)} className="w-full p-1 text-sm border rounded focus:ring-1 focus:ring-emerald-500 outline-none mt-1" /></div>
                              <div className="border-t border-gray-100 pt-1 mt-1"><label className="block text-[10px] font-bold text-gray-500 uppercase">List Price (ราคาตั้ง)</label><input type="number" value={pData.retail} onChange={e => handlePriceChange(color.id, 'retail', e.target.value)} className="w-full p-1 text-sm border rounded focus:ring-1 focus:ring-blue-500 outline-none mt-1" /></div>
                            </div>
                        ) : (
                            <div className="flex items-center justify-center h-48 border-2 border-dashed border-gray-200 rounded bg-gray-50/50">
                                <span className="text-gray-400 font-bold text-sm tracking-widest uppercase"><i className="fas fa-ban mr-1.5"></i> N/A</span>
                            </div>
                        )}
                      </div>
                    )})}
                  </div>

                  <div className="flex justify-end gap-3 pt-4">
                    <button type="button" onClick={() => { setIsModalOpen(false); setEditProductId(null); }} className="px-5 py-2 text-sm text-gray-600 hover:bg-gray-200 rounded-lg font-bold transition-colors">Cancel</button>
                    <button type="submit" className="px-6 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-md transition-transform active:scale-95">{editProductId ? 'Update Product' : 'Save Product'}</button>
                  </div>
                </form>
              </div>
            </div>
          )}

        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
